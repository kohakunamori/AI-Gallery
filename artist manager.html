                || rawJson.syncMethod !== undefined
                || rawJson.webdavConfig !== undefined
                || rawJson.s3Config !== undefined
                || rawJson.webdav !== undefined
                || rawJson.s3 !== undefined;

            const settingsPatch = (() => {
                const source = settingsSource;
                if (!source) return null;
                const out = {};

                if (source.theme !== undefined) {
                    const candidateTheme = String(source.theme || '');
                    if (Object.hasOwn(themes, candidateTheme)) out.theme = candidateTheme;
                }

                if (source.aiConfig !== undefined || source.ai !== undefined) {
                    const aiSource = source.aiConfig !== undefined ? source.aiConfig : source.ai;
                    if (aiSource === null) out.aiConfig = null;
                    else out.aiConfig = (aiSource && typeof aiSource === 'object') ? aiSource : {};
                }

                const backgroundImageDataUrl = String(
                    source?.backgroundImageFile?.dataUrl
                    || source?.backgroundImageFile?.data
                    || source?.assets?.backgroundImageFile?.dataUrl
                    || source?.assets?.backgroundImageFile?.data
                    || source?.backgroundImageDataUrl
                    || ''
                ).trim();

                if (source.displayConfig !== undefined || source.display !== undefined || backgroundImageDataUrl) {
                    const displaySource = source.displayConfig !== undefined ? source.displayConfig : source.display;
                    const displayPatch = displaySource === null ? null : { ...((displaySource && typeof displaySource === 'object') ? displaySource : {}) };
                    if (backgroundImageDataUrl) {
                        const safePatch = displayPatch && typeof displayPatch === 'object' ? displayPatch : {};
                        safePatch.backgroundImage = backgroundImageDataUrl;
                        out.displayConfig = safePatch;
                    } else {
                        out.displayConfig = displayPatch;
                    }
                }

                if (source.nodeTagPresets !== undefined || source.comfyNodeTagPresets !== undefined) {
                    const normalizedPresets = normalizeNodeTagPresetList(source.nodeTagPresets || source.comfyNodeTagPresets || []);
                    out.nodeTagPresets = normalizedPresets;
                    const rawActivePreset = String(source.activeNodeTagPresetId || source.activePresetId || '').trim();
                    out.activeNodeTagPresetId = normalizedPresets.find((p) => p.id === rawActivePreset)?.id || normalizedPresets[0]?.id || '';
                } else if (source.activeNodeTagPresetId !== undefined || source.activePresetId !== undefined) {
                    out.activeNodeTagPresetId = String(source.activeNodeTagPresetId || source.activePresetId || '').trim();
                }

                return Object.keys(out).length ? out : null;
            })();

            const syncConfigPatch = (() => {
                if (!hasSyncSource) return null;
                const source = rawJson && typeof rawJson.syncConfig === 'object' ? rawJson.syncConfig : rawJson;
                const hasSyncMethod = source?.syncMethod !== undefined;
                const hasWebdav = source?.webdavConfig !== undefined || source?.webdav !== undefined;
                const hasS3 = source?.s3Config !== undefined || source?.s3 !== undefined;
                const out = {};
                if (hasSyncMethod) out.syncMethod = String(source?.syncMethod || '').toLowerCase() === 's3' ? 's3' : 'webdav';
                if (hasWebdav) {
                    const webdavSource = source?.webdavConfig !== undefined ? source?.webdavConfig : source?.webdav;
                    out.webdavConfig = webdavSource === null ? null : ((webdavSource && typeof webdavSource === 'object') ? webdavSource : {});
                }
                if (hasS3) {
                    const s3Source = source?.s3Config !== undefined ? source?.s3Config : source?.s3;
                    out.s3Config = s3Source === null ? null : ((s3Source && typeof s3Source === 'object') ? s3Source : {});
                }
                return Object.keys(out).length ? out : null;
            })();

            if (!objArtists) {
                return { artists: [], categories: [], settingsPatch, syncConfigPatch };
            }
            const isVersioned = Number(rawJson.version) >= 2;
            if (isVersioned) {
                return {
                    artists: objArtists,
                    categories: normalizeCategoryList(rawJson.categories),
                    settingsPatch,
                    syncConfigPatch
                };
            }
            const looksLegacy = objArtists.some(item => item && typeof item === 'object' && ('image' in item || 'count' in item || 'time' in item));
            return {
                artists: looksLegacy ? mapLegacyArtists(objArtists) : objArtists,
                categories: normalizeCategoryList(rawJson.categories),
                settingsPatch,
                syncConfigPatch
            };
        };

        const mergeImportResolvedPayload = async (resolved) => {
            const importList = normalizeArtistList(resolved.artists || []);

            const currentTags = new Set(state.liveArtists.map(a => a.tag));
            const newArtists = [...state.liveArtists];
            const importedCategories = new Set(normalizeCategoryList(resolved.categories));
            let addedCount = 0;
            let skippedInvalid = 0;
            let imagePersistFailed = 0;

            for (const item of importList) {
                const tag = String(item?.tag || '').trim();
                if (!tag) { skippedInvalid++; continue; }
                if (currentTags.has(tag)) continue;

                const id = Date.now().toString() + Math.random().toString(36).substr(2, 9);
                if (item.imageUrl && String(item.imageUrl).startsWith('data:')) {
                    try {
                        await saveImageToIDB(id, item.imageUrl);
                    } catch (_) {
                        skippedInvalid++;
                        imagePersistFailed++;
                        continue;
                    }
                }

                const category = normalizeCategoryName(item.category);
                if (category) importedCategories.add(category);

                const normalizedArtist = normalizeArtistRecord({
                    id,
                    name: item.name || tag,
                    tag,
                    category,
                    imageUrl: item.imageUrl || '',
                    danbooruCount: parseInt(item.danbooruCount, 10) || 0,
                    isFavorite: !!item.isFavorite,
                    isNSFW: !!item.isNSFW,
                    note: item.note || '',
                    generatorType: normalizeGeneratorType(item.generatorType),
                    aiModel: item.aiModel || '',
                    styleTag: item.styleTag || '',
                    characterTag: item.characterTag || '',
                    clothingTag: item.clothingTag || '',
                    cfgScale: item.cfgScale || '',
                    seed: item.seed || '',
                    steps: item.steps || '',
                    sampler: item.sampler || '',
                    modelHash: item.modelHash || '',
                    loraWeights: item.loraWeights || '',
                    createdAt: item.createdAt || Date.now()
                });

                newArtists.push(normalizedArtist);
                currentTags.add(tag);
                addedCount++;
            }

            const mergedCategories = normalizeCategoryList([
                ...state.categories,
                ...Array.from(importedCategories),
                ...buildKnownCategoriesFromArtists(newArtists)
            ]);
            const nextActiveCategory = resolveNextActiveCategory(state.activeCategory, mergedCategories);

            const nextStatePatch = {
                liveArtists: newArtists,
                categories: mergedCategories,
                activeCategory: nextActiveCategory
            };

            let settingsUpdated = false;
            let syncConfigUpdated = false;

            const settingsPatch = resolved?.settingsPatch;
            if (settingsPatch && typeof settingsPatch === 'object') {
                if (settingsPatch.theme && Object.hasOwn(themes, settingsPatch.theme)) {
                    nextStatePatch.theme = settingsPatch.theme;
                    settingsUpdated = true;
                }
                if (settingsPatch.aiConfig === null) {
                    nextStatePatch.aiConfig = normalizeAiConfig({});
                    settingsUpdated = true;
                } else if (settingsPatch.aiConfig && typeof settingsPatch.aiConfig === 'object') {
                    nextStatePatch.aiConfig = normalizeAiConfig({ ...(state.aiConfig || {}), ...settingsPatch.aiConfig });
                    settingsUpdated = true;
                }
                if (settingsPatch.displayConfig === null) {
                    nextStatePatch.displayConfig = normalizeDisplayConfig({ backgroundImage: '' });
                    settingsUpdated = true;
                } else if (settingsPatch.displayConfig && typeof settingsPatch.displayConfig === 'object') {
                    nextStatePatch.displayConfig = normalizeDisplayConfig({ ...(state.displayConfig || {}), ...settingsPatch.displayConfig });
                    settingsUpdated = true;
                }
                if (Array.isArray(settingsPatch.nodeTagPresets)) {
                    const normalizedPresets = normalizeNodeTagPresetList(settingsPatch.nodeTagPresets);
                    nextStatePatch.nodeTagPresets = normalizedPresets;
                    const rawActive = String(settingsPatch.activeNodeTagPresetId || '').trim();
                    nextStatePatch.activeNodeTagPresetId = normalizedPresets.find((p) => p.id === rawActive)?.id || normalizedPresets[0]?.id || '';
                    settingsUpdated = true;
                } else if (settingsPatch.activeNodeTagPresetId !== undefined) {
                    const rawActive = String(settingsPatch.activeNodeTagPresetId || '').trim();
                    const basePresets = normalizeNodeTagPresetList(nextStatePatch.nodeTagPresets || state.nodeTagPresets || []);
                    nextStatePatch.activeNodeTagPresetId = basePresets.find((p) => p.id === rawActive)?.id || basePresets[0]?.id || '';
                    settingsUpdated = true;
                }
            }

            const syncConfigPatch = resolved?.syncConfigPatch;
            if (syncConfigPatch && typeof syncConfigPatch === 'object') {
                if (syncConfigPatch.syncMethod !== undefined) {
                    nextStatePatch.syncMethod = syncConfigPatch.syncMethod === 's3' ? 's3' : 'webdav';
                }
                if (syncConfigPatch.webdavConfig === null) {
                    nextStatePatch.webdavConfig = getDefaultWebdavConfig();
                } else if (syncConfigPatch.webdavConfig && typeof syncConfigPatch.webdavConfig === 'object') {
                    nextStatePatch.webdavConfig = normalizeWebdavConfig({ ...(state.webdavConfig || {}), ...syncConfigPatch.webdavConfig });
                }
                if (syncConfigPatch.s3Config === null) {
                    nextStatePatch.s3Config = getDefaultS3Config();
                } else if (syncConfigPatch.s3Config && typeof syncConfigPatch.s3Config === 'object') {
                    nextStatePatch.s3Config = normalizeS3Config({ ...(state.s3Config || {}), ...syncConfigPatch.s3Config });
                }
                syncConfigUpdated = true;
            }

            updateState(nextStatePatch);
            return { addedCount, skippedInvalid, imagePersistFailed, settingsUpdated, syncConfigUpdated };
        };

        const encodeBasicAuth = (username, password) => {
            const raw = `${String(username || '')}:${String(password || '')}`;
            return btoa(unescape(encodeURIComponent(raw)));
        };

        const resolveWebdavTargetUrl = (config) => {
            const endpoint = String(config?.endpoint || '').trim().replace(/\/+$/, '');
            const filePath = String(config?.filePath || '').trim().replace(/^\/+/, '');
            if (!endpoint || !filePath) return '';
            return `${endpoint}/${filePath}`;
        };

        const getWebdavHeaders = (config, extra = {}) => {
            const headers = { ...extra };
            if (config?.username) {
                headers.Authorization = `Basic ${encodeBasicAuth(config.username, config.password || '')}`;
            }
            return headers;
        };

        const hexEncode = (buffer) => Array.from(new Uint8Array(buffer)).map((b) => b.toString(16).padStart(2, '0')).join('');
        const utf8Bytes = (text) => new TextEncoder().encode(String(text ?? ''));
        const sha256Hex = async (text) => {
            const digest = await crypto.subtle.digest('SHA-256', utf8Bytes(text));
            return hexEncode(digest);
        };
        const hmacSha256 = async (keyBytes, dataText) => {
            const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
            const sig = await crypto.subtle.sign('HMAC', cryptoKey, utf8Bytes(dataText));
            return new Uint8Array(sig);
        };
        const encodeRfc3986 = (value) => encodeURIComponent(value).replace(/[!'()*]/g, (ch) => `%${ch.charCodeAt(0).toString(16).toUpperCase()}`);
        const toAmzDatePair = (date = new Date()) => {
            const yyyy = date.getUTCFullYear();
            const mm = String(date.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(date.getUTCDate()).padStart(2, '0');
            const hh = String(date.getUTCHours()).padStart(2, '0');
            const min = String(date.getUTCMinutes()).padStart(2, '0');
            const sec = String(date.getUTCSeconds()).padStart(2, '0');
            const dateStamp = `${yyyy}${mm}${dd}`;
            return { dateStamp, amzDate: `${dateStamp}T${hh}${min}${sec}Z` };
        };
        const trimSlashes = (value) => String(value || '').replace(/^\/+|\/+$/g, '');
        const buildS3RequestInfo = (config) => {
            const cfg = normalizeS3Config(config || {});
            if (!cfg.endpoint || !cfg.bucket || !cfg.objectKey) return null;
            const base = new URL(cfg.endpoint);
            const basePath = trimSlashes(base.pathname);
            const encodedObjectKey = cfg.objectKey.split('/').map((part) => encodeRfc3986(part)).join('/');
            let hostname = base.hostname;
            let pathname = '';
            if (cfg.forcePathStyle) {
                pathname = `/${[basePath, encodeRfc3986(cfg.bucket), encodedObjectKey].filter(Boolean).join('/')}`;
            } else {
                hostname = `${cfg.bucket}.${base.hostname}`;
                pathname = `/${[basePath, encodedObjectKey].filter(Boolean).join('/')}`;
            }
            const url = `${base.protocol}//${hostname}${base.port ? `:${base.port}` : ''}${pathname}`;
            return {
                url,
                hostHeader: `${hostname}${base.port ? `:${base.port}` : ''}`,
                region: cfg.region,
                accessKeyId: cfg.accessKeyId,
                secretAccessKey: cfg.secretAccessKey,
                sessionToken: cfg.sessionToken
            };
        };
        const signS3Request = async ({ method, requestInfo, payload = '', contentType = '' }) => {
            if (!requestInfo) throw new Error('缺少 S3 目标配置');
            if (!requestInfo.accessKeyId || !requestInfo.secretAccessKey) throw new Error('请填写 S3 AccessKey / SecretKey');

            const { dateStamp, amzDate } = toAmzDatePair(new Date());
            const credentialScope = `${dateStamp}/${requestInfo.region}/s3/aws4_request`;
            const payloadHash = await sha256Hex(payload);
            const canonicalUri = new URL(requestInfo.url).pathname || '/';

            const canonicalHeadersMap = {
                host: requestInfo.hostHeader,
                'x-amz-content-sha256': payloadHash,
                'x-amz-date': amzDate
            };
            if (requestInfo.sessionToken) canonicalHeadersMap['x-amz-security-token'] = requestInfo.sessionToken;

            const sortedHeaderKeys = Object.keys(canonicalHeadersMap).sort();
            const canonicalHeaders = `${sortedHeaderKeys.map((k) => `${k}:${String(canonicalHeadersMap[k]).trim()}\n`).join('')}`;
            const signedHeaders = sortedHeaderKeys.join(';');
            const canonicalRequest = [
                method,
                canonicalUri,
                '',
                canonicalHeaders,
                signedHeaders,
                payloadHash
            ].join('\n');
            const canonicalRequestHash = await sha256Hex(canonicalRequest);
            const stringToSign = `AWS4-HMAC-SHA256\n${amzDate}\n${credentialScope}\n${canonicalRequestHash}`;

            const kDate = await hmacSha256(utf8Bytes(`AWS4${requestInfo.secretAccessKey}`), dateStamp);
            const kRegion = await hmacSha256(kDate, requestInfo.region);
            const kService = await hmacSha256(kRegion, 's3');
            const kSigning = await hmacSha256(kService, 'aws4_request');
            const signature = hexEncode(await hmacSha256(kSigning, stringToSign));

            const headers = {
                'x-amz-date': amzDate,
                'x-amz-content-sha256': payloadHash,
                Authorization: `AWS4-HMAC-SHA256 Credential=${requestInfo.accessKeyId}/${credentialScope}, SignedHeaders=${signedHeaders}, Signature=${signature}`
            };
            if (requestInfo.sessionToken) headers['x-amz-security-token'] = requestInfo.sessionToken;
            if (contentType) headers['Content-Type'] = contentType;
            return headers;
        };

        const parseS3ErrorXml = (rawText) => {
            const text = String(rawText || '');
            const pick = (tag) => {
                const match = text.match(new RegExp(`<${tag}>([\\s\\S]*?)<\\/${tag}>`, 'i'));
                return match ? String(match[1]).trim() : '';
            };
            return {
                code: pick('Code'),
                message: pick('Message'),
                requestId: pick('RequestId') || pick('RequestID')
            };
        };

        const buildStorageTextError = (prefix, status, rawText = '') => {
            const fallback = `${prefix} (HTTP ${status || 'unknown'})`;
            const text = String(rawText || '');
            const parsed = parseS3ErrorXml(text);
            const detail = parsed.code
                ? `${parsed.code}${parsed.message ? `: ${parsed.message}` : ''}`
                : (text ? text.replace(/\s+/g, ' ').slice(0, 180) : '');
            const reqInfo = parsed.requestId ? ` (RequestId: ${parsed.requestId})` : '';
            return new Error(`${fallback}${detail ? ` - ${detail}` : ''}${reqInfo}`);
        };

        const formatTransferSize = (bytesValue) => {
            const bytes = Math.max(0, Number(bytesValue) || 0);
            if (bytes < 1024) return `${Math.round(bytes)} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
        };

        const buildTransferProgress = (event) => {
            const loaded = Math.max(0, Number(event?.loaded) || 0);
            const total = Math.max(0, Number(event?.total) || 0);
            const hasTotal = !!event?.lengthComputable && total > 0;
            const percent = hasTotal ? clampNumber(Math.round((loaded / total) * 100), 0, 100) : null;
            return { loaded, total: hasTotal ? total : 0, hasTotal, percent };
        };

        const XHR_TIMEOUT_MS = 180000;

        const executeXhrRequest = ({ method, url, headers = {}, body = null, onUploadProgress, onDownloadProgress }) => {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open(method, url, true);
                xhr.responseType = 'text';
                xhr.withCredentials = false;
                xhr.timeout = XHR_TIMEOUT_MS;

                Object.entries(headers || {}).forEach(([key, value]) => {
                    if (value === undefined || value === null || value === '') return;
                    xhr.setRequestHeader(key, String(value));
                });

                if (typeof onUploadProgress === 'function' && xhr.upload) {
                    xhr.upload.onprogress = (event) => {
                        onUploadProgress(buildTransferProgress(event));
                    };
                }

                if (typeof onDownloadProgress === 'function') {
                    xhr.onprogress = (event) => {
                        onDownloadProgress(buildTransferProgress(event));
                    };
                }

                xhr.onerror = () => reject(new Error('网络请求失败'));
                xhr.onabort = () => reject(new Error('请求被取消'));
                xhr.ontimeout = () => reject(new Error('网络请求超时'));
                xhr.onload = () => {
                    const responseText = String(xhr.responseText || '');
                    const status = Number(xhr.status) || 0;
                    resolve({ status, ok: status >= 200 && status < 300, responseText });
                };

                xhr.send(body === undefined ? null : body);
            });
        };

        const shouldRetryR2WithUsEast1 = (cfg, responseText = '', status = 0) => {
            const endpoint = String(cfg?.endpoint || '').toLowerCase();
            const region = String(cfg?.region || '').toLowerCase();
            if (!endpoint.includes('r2.cloudflarestorage.com')) return false;
            if (region !== 'auto') return false;
            if (status !== 403 && status !== 400) return false;
            const text = String(responseText || '').toLowerCase();
            return text.includes('signaturedoesnotmatch')
                || text.includes('authorizationheadermalformed')
                || text.includes('invalidregion')
                || text.includes('credential');
        };

        const webdavUpload = async (webdavConfigInput = state.webdavConfig, onProgress = null) => {
            const cfg = normalizeWebdavConfig(webdavConfigInput || {});
            const targetUrl = resolveWebdavTargetUrl(cfg);
            if (!targetUrl) throw new Error('请先配置 WebDAV 地址和文件路径');
            const payload = await buildExportPayload();
            const body = JSON.stringify(payload, null, 2);
            const response = await executeXhrRequest({
                method: 'PUT',
                url: targetUrl,
                headers: getWebdavHeaders(cfg, { 'Content-Type': 'application/json; charset=utf-8' }),
                body,
                onUploadProgress: (progress) => {
                    if (typeof onProgress === 'function') onProgress(progress);
                }
            });
            if (!response.ok) throw buildStorageTextError('WebDAV 上传失败', response.status, response.responseText);
            return 'WebDAV';
        };

        const webdavDownload = async (webdavConfigInput = state.webdavConfig, onProgress = null) => {
            const cfg = normalizeWebdavConfig(webdavConfigInput || {});
            const targetUrl = resolveWebdavTargetUrl(cfg);
            if (!targetUrl) throw new Error('请先配置 WebDAV 地址和文件路径');
            const response = await executeXhrRequest({
                method: 'GET',
                url: targetUrl,
                headers: getWebdavHeaders(cfg, { Accept: 'application/json' }),
                onDownloadProgress: (progress) => {
                    if (typeof onProgress === 'function') onProgress(progress);
                }
            });
            if (!response.ok) throw buildStorageTextError('WebDAV 拉取失败', response.status, response.responseText);
            return parseJsonOrThrow(response.responseText || '{}', 'WebDAV 响应');
        };

        const s3Upload = async (s3ConfigInput = state.s3Config, onProgress = null) => {
            const cfg = normalizeS3Config(s3ConfigInput || {});
            const requestInfo = buildS3RequestInfo(cfg);
            if (!requestInfo) throw new Error('请完善 S3 endpoint/bucket/objectKey');
            const payloadObj = await buildExportPayload();
            const payload = JSON.stringify(payloadObj, null, 2);
            let headers = await signS3Request({
                method: 'PUT',
                requestInfo,
                payload,
                contentType: 'application/json; charset=utf-8'
            });
            let response = await executeXhrRequest({
                method: 'PUT',
                url: requestInfo.url,
                headers,
                body: payload,
                onUploadProgress: (progress) => {
                    if (typeof onProgress === 'function') onProgress(progress);
                }
            });
            if (!response.ok) {
                const responseText = String(response.responseText || '');
                if (shouldRetryR2WithUsEast1(cfg, responseText, response.status)) {
                    const retryInfo = { ...requestInfo, region: 'us-east-1' };
                    headers = await signS3Request({ method: 'PUT', requestInfo: retryInfo, payload, contentType: 'application/json; charset=utf-8' });
                    response = await executeXhrRequest({
                        method: 'PUT',
                        url: retryInfo.url,
                        headers,
                        body: payload,
                        onUploadProgress: (progress) => {
                            if (typeof onProgress === 'function') onProgress(progress);
                        }
                    });
                    if (response.ok) return 'S3';
                }
                throw buildStorageTextError('S3 上传失败', response.status, response.responseText || '');
            }
            return 'S3';
        };

        const s3Download = async (s3ConfigInput = state.s3Config, onProgress = null) => {
            const cfg = normalizeS3Config(s3ConfigInput || {});
            const requestInfo = buildS3RequestInfo(cfg);
            if (!requestInfo) throw new Error('请完善 S3 endpoint/bucket/objectKey');
            let headers = await signS3Request({ method: 'GET', requestInfo, payload: '' });
            let response = await executeXhrRequest({
                method: 'GET',
                url: requestInfo.url,
                headers,
                onDownloadProgress: (progress) => {
                    if (typeof onProgress === 'function') onProgress(progress);
                }
            });
            if (!response.ok) {
                const responseText = String(response.responseText || '');
                if (shouldRetryR2WithUsEast1(cfg, responseText, response.status)) {
                    const retryInfo = { ...requestInfo, region: 'us-east-1' };
                    headers = await signS3Request({ method: 'GET', requestInfo: retryInfo, payload: '' });
                    response = await executeXhrRequest({
                        method: 'GET',
                        url: retryInfo.url,
                        headers,
                        onDownloadProgress: (progress) => {
                            if (typeof onProgress === 'function') onProgress(progress);
                        }
                    });
                    if (response.ok) return parseJsonOrThrow(response.responseText || '{}', 'S3 响应');
                }
                throw buildStorageTextError('S3 拉取失败', response.status, response.responseText || '');
            }
            return parseJsonOrThrow(response.responseText || '{}', 'S3 响应');
        };

        window.closeSyncModal = () => {
            clearSyncProgressResetTimer();
            updateState({
                isSyncModalOpen: false,
                syncProgressVisible: false,
                syncProgressPercent: 0,
                syncProgressLabel: '',
                syncProgressStatus: 'idle'
            });
        };
        window.handleSyncMethodChange = (method) => {
            updateState({ syncMethod: method === 's3' ? 's3' : 'webdav' });
        };
        window.applyS3ProviderPreset = (presetId) => {
            const preset = S3_PROVIDER_PRESETS.find((item) => item.id === presetId);
            if (!preset) return;
            const merged = normalizeS3Config({ ...state.s3Config, ...preset, provider: preset.id });
            updateState({ s3Config: merged });
            showToast(`已套用 ${preset.name} 示例`);
        };
        const readSyncDraftFromInputs = () => {
            const currentWebdav = normalizeWebdavConfig(state.webdavConfig || {});
            const currentS3 = normalizeS3Config(state.s3Config || {});
            const pickValue = (id, fallback = '') => {
                const el = document.getElementById(id);
                return el && typeof el.value === 'string' ? el.value : fallback;
            };
            const pickChecked = (id, fallback = false) => {
                const el = document.getElementById(id);
                return el && typeof el.checked === 'boolean' ? !!el.checked : !!fallback;
            };

            const syncMethodRaw = pickValue('sync-method-select', state.syncMethod || 'webdav');
            const syncMethod = String(syncMethodRaw || '').toLowerCase() === 's3' ? 's3' : 'webdav';
            const webdavConfig = normalizeWebdavConfig({
                endpoint: pickValue('webdav-endpoint-input', currentWebdav.endpoint),
                username: pickValue('webdav-username-input', currentWebdav.username),
                password: pickValue('webdav-password-input', currentWebdav.password),
                filePath: pickValue('webdav-filepath-input', currentWebdav.filePath)
            });
            const s3Config = normalizeS3Config({
                endpoint: pickValue('s3-endpoint-input', currentS3.endpoint),
                region: pickValue('s3-region-input', currentS3.region),
                bucket: pickValue('s3-bucket-input', currentS3.bucket),
                objectKey: pickValue('s3-objectkey-input', currentS3.objectKey),

        window.saveAISettings = () => {
             const titleApiHost = (document.getElementById('ai-title-host-input')?.value || 'https://api.openai.com/v1').replace(/\/+$/, '');

        const AI_TITLE_PRESETS = {
            style: {
                label: '风格汇总标题',

            },
            full: {
                label: '整图汇总标题',
                prompt: '请基于整张图片的主体、氛围、风格与服饰信息综合生成一个中文标题。要求：不超过10个中文字符，不要标点，不要解释。'
            }
        };

        const normalizeAiTitleOutput = (rawText = '') => {
            const text = String(rawText || '')
                .replace(/[\r\n]+/g, ' ')
                .replace(/[“”"'`]/g, '')
                .replace(/[。！？!?,，；;：:]+/g, ' ')
                .trim();
            if (!text) return '';
            return text.slice(0, 10).trim();
        };

        const buildActiveComfyGraph = (graphInput = {}) => {
            const graph = normalizeComfyGraph(graphInput || {});
            if (!graph || typeof graph !== 'object') return {};
            const entries = Object.entries(graph);
            if (!entries.length) return {};

            const collectReferenced = (value, bucket) => {
                if (Array.isArray(value)) {
                    if (value.length >= 2 && (typeof value[0] === 'string' || typeof value[0] === 'number')) {
                        bucket.add(String(value[0]));
                    }
                    value.forEach((item) => {
                        collectReferenced(item, bucket);
                    });
                    return;
                }
                if (value && typeof value === 'object') {
                    Object.values(value).forEach((item) => {
                        collectReferenced(item, bucket);
                    });
                }
            };

            const referencedIds = new Set();
            entries.forEach(([, node]) => {
                collectReferenced(node?.inputs, referencedIds);
            });

            const sinkIds = entries
                .filter(([id, node]) => {
                    const classType = String(node?.class_type || '').toLowerCase();
                    const likelyOutput = /saveimage|previewimage|imagesave|save\s*image|vaedecode|image\s*output/.test(classType);
                    return likelyOutput || !referencedIds.has(String(id));
                })
                .map(([id]) => String(id));

            const activeIds = new Set();
            const stack = sinkIds.length ? [...sinkIds] : entries.map(([id]) => String(id));
            while (stack.length) {
                const nodeId = String(stack.pop());
                if (activeIds.has(nodeId)) continue;
                activeIds.add(nodeId);
                const node = graph[nodeId];
                if (!node?.inputs || typeof node.inputs !== 'object') continue;
                Object.values(node.inputs).forEach((value) => {
                    const refs = new Set();
                    collectReferenced(value, refs);
                    refs.forEach((refId) => {
                        if (!activeIds.has(refId)) stack.push(refId);
                    });
                });
            }

            return entries
                .filter(([id]) => activeIds.has(String(id)))
                .reduce((acc, [id, node]) => {
                    acc[id] = node;
                    return acc;
                }, {});
        };

        const parseWorkflowInferenceJson = (rawText = '') => {
            const direct = parseJSONLoose(rawText);
            if (direct && typeof direct === 'object') return direct;
            const text = String(rawText || '');
            const fenced = text.match(/```(?:json)?\s*([\s\S]*?)```/i);
            if (fenced) {
                const parsedFenced = parseJSONLoose(fenced[1]);
                if (parsedFenced && typeof parsedFenced === 'object') return parsedFenced;
            }
            const braces = text.match(/\{[\s\S]*\}/);
            if (braces) {
                const parsedBraces = parseJSONLoose(braces[0]);
                if (parsedBraces && typeof parsedBraces === 'object') return parsedBraces;
            }
            return null;
        };

        const extractPromptContextFromComfyGraph = (graphInput = {}) => {
            return { positive: '', negative: '' };
        };

        const normalizeWorkflowFieldPatch = (patch = {}) => {
            const out = {};
            const pick = (key) => String(patch?.[key] || '').trim();
            const assignIfValue = (key, value) => {
                const normalized = String(value || '').trim();
                if (normalized) out[key] = normalized;
            };

            assignIfValue('tag', pick('tag'));
            assignIfValue('aiModel', pick('aiModel'));
            assignIfValue('cfgScale', pick('cfgScale'));
            assignIfValue('seed', pick('seed'));
            assignIfValue('steps', pick('steps'));
            assignIfValue('sampler', pick('sampler'));
            assignIfValue('modelHash', pick('modelHash'));
            assignIfValue('styleTag', pick('styleTag'));
            assignIfValue('characterTag', pick('characterTag'));
            assignIfValue('clothingTag', pick('clothingTag'));

            const loraRaw = patch?.loraWeights;
            if (Array.isArray(loraRaw)) {
                const items = loraRaw.map((item) => String(item || '').trim()).filter(Boolean);
                if (items.length) out.loraWeights = Array.from(new Set(items)).join(' | ');
            } else {
                assignIfValue('loraWeights', String(loraRaw || '').trim());
            }

            const generatorType = normalizeGeneratorType(pick('generatorType') || 'COMFY');
            if (generatorType) out.generatorType = generatorType;
            return out;
        };

        const unwrapWorkflowInferencePayload = (parsed = null) => {
            if (!parsed || typeof parsed !== 'object') return {};
            const candidates = [
                parsed,
                parsed.full_workflow,
                parsed.result,
                parsed.data,
                parsed.payload,
                parsed.output,
                parsed.inference,
                parsed.params,
                parsed.fields
            ].filter((item) => item && typeof item === 'object');
            const preferred = candidates.find((item) => (
                item.aiModel !== undefined
                || item.cfgScale !== undefined
                || item.seed !== undefined
                || item.steps !== undefined
                || item.sampler !== undefined
                || item.styleTag !== undefined
                || item.characterTag !== undefined
                || item.clothingTag !== undefined
                || item.loraWeights !== undefined
            ));
            return preferred || parsed;
        };

        const applyWorkflowAutofillPatch = (patch = {}) => {

        window.extractWorkflowParamsWithLLM = async () => {

            const llmModel = String(config.workflowModel || 'gpt-4o').trim() || 'gpt-4o';

            const fullWorkflow = normalizeComfyGraph(workflow) || {};
            const activeGraph = buildActiveComfyGraph(workflow);

                ...getComfyPromptFields(activeGraph),

            try {
                const systemPrompt = [
                    'You are an advanced ComfyUI Workflow Execution Engine.',
                    'Your task is to analyze the provided ComfyUI workflow JSON and accurately extract the final generation parameters.',
                    'CRITICAL GRAPH TRACING RULES:',
                    '1. START at the terminal nodes (e.g., KSampler, FaceDetailer, SaveImage).',
                    '2. TRACE BACKWARDS through the node links (represented as ["node_id", slot_index]).',
                    '3. EVALUATE LOGIC NODES: If you encounter routing nodes (like "easy ifElse", "Switch"), you MUST evaluate their control inputs (like "boolean").',
                    '   - Example: If "easy ifElse" has "boolean": false, you MUST ONLY trace the "on_false" path. The "on_true" path is DEAD and MUST be ignored.',
                    '4. EVALUATE STRING MANIPULATION: If you encounter "Text Concatenate", "ShowText", or "Text Multiline", mentally execute them to build the exact final string.',
                    '5. LORAS: Find all active "LoraLoader" nodes in the execution path. Extract their names and strengths. Format: "lora_name (M:model_weight, C:clip_weight) | ...".',
                    'OUTPUT REQUIREMENTS:',
                    'Return ONLY a valid JSON object matching the output_contract schema. No markdown, no explanations.'
                ].join('\n');
                const userPayload = {
                    task: 'infer_effective_generation_params',
                    full_workflow: fullWorkflow,
                    active_graph: activeGraph,
                    required_keys: ['generatorType', 'tag', 'aiModel', 'cfgScale', 'seed', 'steps', 'sampler', 'modelHash', 'loraWeights', 'styleTag', 'characterTag', 'clothingTag'],
                    output_contract: {
                        generatorType: 'string(COMFY|SD|NAI)',
                        tag: 'string (final positive prompt text)',
                        aiModel: 'string',
                        cfgScale: 'string',
                        seed: 'string',
                        steps: 'string',
                        sampler: 'string',
                        modelHash: 'string',
                        loraWeights: 'string or string[]',
                        styleTag: 'string',
                        characterTag: 'string',
                        clothingTag: 'string'
                    }
                };

                const createWorkflowRequestMessages = (extraInstruction = '') => {
                    const suffix = extraInstruction ? `\n\n${extraInstruction}` : '';
                    return [
                        { role: 'system', content: systemPrompt },
                        {
                            role: 'user',
                            content: `Strictly analyze effective params from this ComfyUI workflow JSON and output ONLY one JSON object:\n${JSON.stringify(userPayload)}${suffix}`
                        }
                    ];
                };

                const requestWorkflowInference = async (maxTokens, extraInstruction = '') => {
                    const response = await fetch(`${llmHost}/chat/completions`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${llmKey}`
                        },
                        body: JSON.stringify({
                            model: llmModel,
                            temperature: 0,
                            messages: createWorkflowRequestMessages(extraInstruction),
                            max_tokens: maxTokens
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        throw new Error(err.error?.message || response.statusText || 'LLM 请求失败');
                    }

                    const data = await response.json();
                    const choice = data?.choices?.[0] || {};
                    const finishReason = String(choice?.finish_reason || '').toLowerCase();
                    const contentRaw = choice?.message?.content;
                    const llmText = typeof contentRaw === 'string'
                        ? contentRaw.trim()
                        : (Array.isArray(contentRaw)
                            ? contentRaw.map((part) => (typeof part?.text === 'string' ? part.text : '')).join('').trim()
                            : '');
                    return { llmText, finishReason };
                };

                let inference = await requestWorkflowInference(1400);
                if (inference.finishReason === 'length' || !inference.llmText) {
                    inference = await requestWorkflowInference(
                        2800,
                        'IMPORTANT: Previous answer was truncated. Re-generate the COMPLETE JSON object from scratch. Output only valid JSON.'
                    );
                }

                if (inference.finishReason === 'length') {
                    throw new Error('LLM 返回被截断（finish_reason=length），请提高模型输出上限或更换更长上下文模型');
                }

                const llmText = String(inference.llmText || '').trim();
                if (!llmText) {
                    throw new Error('LLM 返回为空');
                }
                const parsed = parseWorkflowInferenceJson(llmText);
                if (!parsed || typeof parsed !== 'object') {
                    throw new Error('LLM 返回不是完整 JSON（可能被截断或格式不合法）');
                }
                const unwrapped = unwrapWorkflowInferencePayload(parsed);
                const llmPatch = normalizeWorkflowFieldPatch(unwrapped || {});
                const mergedPatch = { ...deterministic, ...llmPatch, generatorType: 'COMFY' };
                const updated = applyWorkflowAutofillPatch(mergedPatch);
                if (!updated) {
                    showToast('LLM 未提取到可用参数');
                    return;
                }
                renderModals();
                showToast('已按工作流实际生效链路自动填充参数');
            } catch (error) {
                console.error('Workflow LLM inference error:', error);
                const fallbackApplied = applyWorkflowAutofillPatch({ ...deterministic, generatorType: 'COMFY' });
                if (fallbackApplied) {
                    renderModals();
                    showToast(`LLM 推理失败，已应用基础提取：${normalizeErrorMessage(error)}`);
                } else {
                    showToast(`LLM 推理失败：${normalizeErrorMessage(error)}`);
                }
            } finally {
                if (btn) {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    lucide.createIcons(btn);
                }
            }
        };

                             <button onclick="copyTag('${escapedId}', event)" class="btn-icon liquid-action p-2.5 bg-white/90 dark:bg-slate-800/90 text-indigo-600 dark:text-indigo-400 rounded-full backdrop-blur-md shadow-lg hover:bg-indigo-50 dark:hover:bg-slate-700" title="复制 Tag"><i data-lucide="copy" class="w-5 h-5"></i></button>
                             <button onclick="handleCardAction('${escapedId}', 'preview', event)" class="btn-icon liquid-action p-2.5 bg-white/90 dark:bg-slate-800/90 text-slate-700 dark:text-slate-200 rounded-full backdrop-blur-md shadow-lg hover:bg-indigo-50 dark:hover:bg-slate-700" title="预览"><i data-lucide="eye" class="w-5 h-5"></i></button>
                             <button onclick="handleCardAction('${escapedId}', 'edit', event)" class="btn-icon liquid-action p-2.5 bg-white/90 dark:bg-slate-800/90 text-slate-700 dark:text-slate-200 rounded-full backdrop-blur-md shadow-lg hover:bg-indigo-50 dark:hover:bg-slate-700" title="编辑"><i data-lucide="edit-3" class="w-5 h-5"></i></button>

                        </div>
                        <button onclick="toggleFavorite('${escapedId}', event)" class="btn-icon liquid-action absolute top-3 left-3 p-2.5 rounded-full ${artist.isFavorite ? 'bg-white/90 dark:bg-slate-800/90 text-pink-500 shadow-md opacity-100 pointer-events-auto' : 'bg-black/20 text-white/70 opacity-0 -translate-y-1 pointer-events-none group-hover:opacity-100 group-hover:translate-y-0 group-hover:pointer-events-auto hover:bg-white/90 hover:text-pink-400'} backdrop-blur-sm transition-all duration-300 z-30"><i data-lucide="heart" class="w-5 h-5 ${artist.isFavorite ? 'fill-current' : ''}"></i></button>

        const applySidebarFollowLayout = (container) => {

            const metrics = getGeneratorWindowMetrics();
            container.style.position = 'fixed';

            container.style.height = `${metrics.height}px`;
            container.style.zIndex = '35';

            if (!generatorWindowPos || !Number.isFinite(generatorWindowPos.x) || !Number.isFinite(generatorWindowPos.y)) {
                generatorWindowPos = {
                    x: window.innerWidth - metrics.width - metrics.margin,
                    y: metrics.minTop
                };

            const panelHeight = container.getBoundingClientRect().height || metrics.height;
            const next = clampGeneratorWindowPosition(generatorWindowPos.x, generatorWindowPos.y, panelHeight, metrics);
            generatorWindowPos = next;
            container.style.left = `${next.x}px`;
            container.style.top = `${next.y}px`;
            saveGeneratorWindowPosition();

                                <button onclick="updateArtistWeight('${escapedId}', -0.1, event)" class="btn-icon liquid-action p-0.5 bg-white dark:bg-slate-700 hover:bg-indigo-50 dark:hover:bg-slate-600 rounded-md text-slate-600 dark:text-slate-300 transition-colors"><i data-lucide="chevron-down" class="w-3 h-3"></i></button>

                                            <h3 class="text-sm font-bold text-indigo-600 dark:text-indigo-400 mb-3 flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i>AI 绘画信息</h3>
                                            <div class="grid grid-cols-2 gap-3">
                                                <div class="col-span-2">
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Generator 类型</label>
                                                    <select value="${state.formData.generatorType || ''}" oninput="handleModalFormInput('generatorType', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm">
                                                        <option value="">Auto (自动识别)</option>
                                                        <option value="SD" ${state.formData.generatorType === 'SD' ? 'selected' : ''}>SD</option>
                                                        <option value="COMFY" ${state.formData.generatorType === 'COMFY' ? 'selected' : ''}>COMFY</option>
                                                        <option value="NAI" ${state.formData.generatorType === 'NAI' ? 'selected' : ''}>NAI</option>
                                                    </select>
                                                </div>
                                                <div class="col-span-2">
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">使用的绘画模型</label>
                                                    <input type="text" id="modal-ai-model" value="${safeFormAiModel}" oninput="handleModalFormInput('aiModel', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: Stable Diffusion">
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">画风 Tag</label>
                                                    <input type="text" id="modal-style-tag" value="${safeFormStyleTag}" oninput="handleModalFormInput('styleTag', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: 日系薄涂">
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">角色 Tag</label>
                                                    <input type="text" id="modal-character-tag" value="${safeFormCharacterTag}" oninput="handleModalFormInput('characterTag', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: 白发">
                                                </div>
                                                <div class="col-span-2">
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">服装 Tag</label>
                                                    <input type="text" id="modal-clothing-tag" value="${safeFormClothingTag}" oninput="handleModalFormInput('clothingTag', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: 水手服">
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">CFG Scale</label>
                                                    <input type="text" value="${safeFormCfg}" oninput="handleModalFormInput('cfgScale', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: 7">
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Seed</label>
                                                    <input type="text" value="${safeFormSeed}" oninput="handleModalFormInput('seed', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: 123456789">
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Steps</label>
                                                    <input type="text" value="${safeFormSteps}" oninput="handleModalFormInput('steps', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: 28">
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Sampler</label>
                                                    <input type="text" value="${safeFormSampler}" oninput="handleModalFormInput('sampler', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: DPM++ 2M Karras">
                                                </div>
                                                <div class="col-span-2">
                                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">LoRA（模型/CLIP 权重）</label>
                                                    <input type="text" value="${safeFormLoraWeights}" oninput="handleModalFormInput('loraWeights', this.value)" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-sm shadow-sm" placeholder="例如: detail_tweaker (M:0.8, C:1) | anime_style (M:0.6, C:0.7)">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-5 flex gap-3 flex-shrink-0 pt-4 border-t border-slate-200 dark:border-slate-700">
                                <button onclick="handleCloseModal()" class="btn-icon liquid-action flex-1 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-sm">取消</button>
                                <button id="modal-save-btn" onclick="handleSaveArtist()" class="btn-icon liquid-action-tint flex-1 py-2.5 rounded-xl bg-indigo-600 text-white font-bold text-sm shadow-xl hover:bg-indigo-500 hover:shadow-indigo-500/40 transition-all disabled:opacity-50 disabled:cursor-not-allowed" ${!state.formData.tag.trim() ? 'disabled' : ''}>保存更改</button>
                            </div>
                        </div>
                    </div>`;
                updateModalImagePreviewDOM(); 
            } else {
                container.innerHTML = '';
            }

            // Render Preview Modal and Note Viewer
            if (state.previewImage) {
                const safePreviewImage = escapeHtml(state.previewImage);
                previewContainer.innerHTML = `
                    <div class="fixed inset-0 z-[80] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 animate-fade-in" onclick="closePreview()">
                        <button onclick="closePreview()" class="absolute top-6 right-6 p-3 bg-white/10 hover:bg-white/20 text-white rounded-full transition-all z-50"><i data-lucide="x" class="w-8 h-8"></i></button>
                        <div class="relative max-w-5xl max-h-full w-full flex items-center justify-center" onclick="event.stopPropagation()"><img src="${safePreviewImage}" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl" /></div>
                    </div>`;
            } else {
                previewContainer.innerHTML = '';
            }

            // Render Tag Selector
            const tagContainer = document.getElementById('tag-selector-container');
            if (state.tagSelector) {
                const artist = state.liveArtists.find(a => a.id === state.tagSelector.id);
                if (artist) {
                    const isLiquidMode = (state.displayConfig?.styleMode || 'default') === 'liquid-glass';
                    const tags = [];
            if (artist.tag) tags.push({ type: 'tag', label: '图像 Tag', value: artist.tag, color: 'indigo' });
                    if (artist.aiModel) tags.push({ type: 'aiModel', label: '模型', value: artist.aiModel, color: 'purple' });
                    if (artist.styleTag) tags.push({ type: 'styleTag', label: '画风', value: artist.styleTag, color: 'pink' });
                    if (artist.characterTag) tags.push({ type: 'characterTag', label: '角色', value: artist.characterTag, color: 'cyan' });
                    if (artist.clothingTag) tags.push({ type: 'clothingTag', label: '服装', value: artist.clothingTag, color: 'amber' });

                    const colorClasses = {
                        indigo: isLiquidMode ? 'bg-indigo-500/75 hover:bg-indigo-500/90 border border-white/25' : 'bg-indigo-500 hover:bg-indigo-600',
                        purple: isLiquidMode ? 'bg-purple-500/75 hover:bg-purple-500/90 border border-white/25' : 'bg-purple-500 hover:bg-purple-600',
                        pink: isLiquidMode ? 'bg-pink-500/75 hover:bg-pink-500/90 border border-white/25' : 'bg-pink-500 hover:bg-pink-600',
                        cyan: isLiquidMode ? 'bg-cyan-500/75 hover:bg-cyan-500/90 border border-white/25' : 'bg-cyan-500 hover:bg-cyan-600',
                        amber: isLiquidMode ? 'bg-amber-500/75 hover:bg-amber-500/90 border border-white/25' : 'bg-amber-500 hover:bg-amber-600'
                    };

                    const selectorPanelClass = isLiquidMode
                        ? 'absolute glass-card rounded-2xl shadow-2xl border border-white/30 dark:border-slate-600/55 overflow-hidden animate-fade-in max-w-72'
                        : 'absolute glass-card rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden animate-fade-in max-w-72';
                    const selectorHeaderClass = isLiquidMode
                        ? 'px-4 py-3 glass-header border-b border-white/20 dark:border-slate-700/60 flex items-center justify-between'
                        : 'px-4 py-3 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between';
                    const selectorCloseClass = isLiquidMode
                        ? 'btn-icon liquid-action p-1 rounded-lg transition-colors text-slate-600 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'
                        : 'btn-icon p-1 rounded-lg transition-colors text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700';
                    const tagButtonBaseClass = isLiquidMode
                        ? 'btn-icon liquid-action w-full text-left px-4 py-2.5 rounded-xl text-sm text-white shadow-lg transition-all flex items-center gap-2'
                        : 'w-full text-left px-4 py-2.5 rounded-xl text-sm text-white transition-all flex items-center gap-2';

                tagContainer.innerHTML = `
                        <div class="fixed inset-0 z-[100]" onclick="closeTagSelector()">
                            <div class="${selectorPanelClass}" style="left: ${state.tagSelector.x}px; top: ${state.tagSelector.y}px;">
                                <div class="${selectorHeaderClass}">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">选择要复制的 Tag</span>
                                    <button onclick="closeTagSelector()" class="${selectorCloseClass}"><i data-lucide="x" class="w-4 h-4"></i></button>
                                </div>
                                <div class="p-2 space-y-1 max-h-60 overflow-y-auto custom-scrollbar">
                                    ${tags.map(t => `
                                        <button onclick="copySpecificTag('${escapeJsSingleQuote(artist.id)}', '${escapeJsSingleQuote(t.type)}', event)" class="${tagButtonBaseClass} ${colorClasses[t.color]} hover:opacity-90">
                                            <i data-lucide="${t.type === 'tag' ? 'tag' : t.type === 'aiModel' ? 'cpu' : 'palette'}" class="w-4 h-4"></i>
                                            <span class="font-medium">${escapeHtml(t.label)}:</span>
                                            <span class="truncate flex-1">${escapeHtml(t.value)}</span>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        </div>`;
                    lucide.createIcons(tagContainer);
                }
            } else {
                tagContainer.innerHTML = '';
            }

            // Render node-tag preset manager
            if (nodeTagPresetContainer && state.isModalOpen && state.isNodeTagPresetOpen) {
                const presets = normalizeNodeTagPresetList(state.nodeTagPresets);
                const activePreset = presets.find((p) => p.id === state.activeNodeTagPresetId) || presets[0] || { id: '', name: '', mappings: [] };
                nodeTagPresetContainer.innerHTML = `
                    <div class="fixed inset-0 z-[96] bg-black/55 backdrop-blur-md flex items-center justify-center p-4 animate-fade-in" onclick="closeNodeTagPresetManager()">
                        <div class="glass-modal dark:bg-slate-900/95 rounded-[1.5rem] shadow-2xl p-5 relative z-10 w-full max-w-5xl border dark:border-slate-700 max-h-[88vh] overflow-hidden flex flex-col" onclick="event.stopPropagation()">
                            <button onclick="closeNodeTagPresetManager()" class="btn-icon liquid-action absolute top-4 right-4 p-2 rounded-full text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors z-10"><i data-lucide="x" class="w-5 h-5"></i></button>
                            <h2 class="text-lg font-bold text-slate-800 dark:text-white mb-4 pr-10 flex items-center gap-2"><i data-lucide="settings-2" class="w-5 h-5 text-violet-500"></i>节点数据预设管理</h2>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 flex-1 min-h-0">
                                <div class="md:col-span-1 border border-slate-200 dark:border-slate-700 rounded-xl p-3 overflow-y-auto custom-scrollbar">
                                    <div class="space-y-2">
                                        ${presets.map((p) => `<div class="flex items-center gap-2 ${state.activeNodeTagPresetId === p.id ? 'bg-violet-100/70 dark:bg-violet-900/30' : 'bg-slate-50 dark:bg-slate-800/60'} rounded-lg p-2">
                                            <button onclick="selectNodeTagPreset('${escapeJsSingleQuote(p.id)}')" class="text-left flex-1 text-xs font-semibold text-slate-700 dark:text-slate-200 truncate">${escapeHtml(p.name)}</button>
                                            <button onclick="renameNodeTagPreset('${escapeJsSingleQuote(p.id)}')" class="btn-icon p-1 rounded text-slate-500 hover:text-indigo-600"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                                            <button onclick="deleteNodeTagPreset('${escapeJsSingleQuote(p.id)}')" class="btn-icon p-1 rounded text-slate-500 hover:text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                        </div>`).join('')}
                                    </div>
                                    <button onclick="addNodeTagPreset()" class="btn-icon liquid-action w-full mt-3 py-2 rounded-lg border border-dashed border-violet-300 dark:border-violet-700 text-violet-600 dark:text-violet-300 text-xs font-bold">+ 新增预设</button>
                                </div>

                                <div class="md:col-span-2 border border-slate-200 dark:border-slate-700 rounded-xl p-3 overflow-y-auto custom-scrollbar">
                                    <div class="flex items-center justify-between mb-3">
                                        <div class="text-xs font-bold text-slate-500 dark:text-slate-400">当前预设：${escapeHtml(activePreset.name || '-')}</div>
                                        <button onclick="addNodeTagMapping('${escapeJsSingleQuote(activePreset.id)}')" class="btn-icon liquid-action px-2.5 py-1.5 rounded-lg bg-violet-100 dark:bg-violet-900/30 text-violet-700 dark:text-violet-300 text-xs font-bold">+ 添加映射</button>
                                    </div>
                                    <div class="space-y-2">
                                        ${(activePreset.mappings || []).map((m) => `<div class="grid grid-cols-12 gap-2 items-center p-2 rounded-lg bg-slate-50 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700">
                                            <select onchange="updateNodeTagMapping('${escapeJsSingleQuote(activePreset.id)}','${escapeJsSingleQuote(m.id)}','target',this.value)" class="col-span-2 px-2 py-1.5 rounded bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-xs">
                                                <option value="tag" ${m.target === 'tag' ? 'selected' : ''}>Tag</option>
                                                <option value="styleTag" ${m.target === 'styleTag' ? 'selected' : ''}>画风</option>
                                                <option value="characterTag" ${m.target === 'characterTag' ? 'selected' : ''}>角色</option>
                                                <option value="clothingTag" ${m.target === 'clothingTag' ? 'selected' : ''}>服装</option>
                                                <option value="aiModel" ${m.target === 'aiModel' ? 'selected' : ''}>模型</option>
                                                <option value="cfgScale" ${m.target === 'cfgScale' ? 'selected' : ''}>CFG</option>
                                                <option value="seed" ${m.target === 'seed' ? 'selected' : ''}>Seed</option>
                                                <option value="steps" ${m.target === 'steps' ? 'selected' : ''}>Steps</option>
                                                <option value="sampler" ${m.target === 'sampler' ? 'selected' : ''}>Sampler</option>
                                            </select>
                                            <select onchange="updateNodeTagMapping('${escapeJsSingleQuote(activePreset.id)}','${escapeJsSingleQuote(m.id)}','nodeMode',this.value)" class="col-span-2 px-2 py-1.5 rounded bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-xs">
                                                <option value="class" ${m.nodeMode !== 'id' ? 'selected' : ''}>按节点类</option>
                                                <option value="id" ${m.nodeMode === 'id' ? 'selected' : ''}>按节点ID</option>
                                            </select>
                                            <input value="${escapeHtml(m.nodeRef)}" oninput="updateNodeTagMapping('${escapeJsSingleQuote(activePreset.id)}','${escapeJsSingleQuote(m.id)}','nodeRef',this.value)" class="col-span-3 px-2 py-1.5 rounded bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-xs" placeholder="如 CLIPTextEncode 或 12">
                                            <input value="${escapeHtml(m.paramPath)}" oninput="updateNodeTagMapping('${escapeJsSingleQuote(activePreset.id)}','${escapeJsSingleQuote(m.id)}','paramPath',this.value)" class="col-span-4 px-2 py-1.5 rounded bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-xs" placeholder="如 inputs.text">
                                            <button onclick="removeNodeTagMapping('${escapeJsSingleQuote(activePreset.id)}','${escapeJsSingleQuote(m.id)}')" class="btn-icon col-span-1 p-1.5 rounded text-slate-500 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                                        </div>`).join('') || '<div class="text-xs text-slate-500 dark:text-slate-400">暂无映射，点击“添加映射”开始。</div>'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            } else if (nodeTagPresetContainer) {
                nodeTagPresetContainer.innerHTML = '';
            }

            // Render ComfyUI Workflow Viewer
            const comfyContainer = document.getElementById('comfy-workflow-container');
            if (comfyContainer && state.showComfyWorkflow && state.comfyWorkflowData) {
                const jsonStr = JSON.stringify(state.comfyWorkflowData, null, 2);
                const escapedJson = jsonStr.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                comfyContainer.innerHTML = `
                    <div class="fixed inset-0 z-[95] bg-black/60 backdrop-blur-md flex items-center justify-center p-6 animate-fade-in" onclick="closeComfyWorkflowViewer()">
                        <div class="glass-modal dark:bg-slate-900/95 rounded-[2rem] shadow-2xl p-6 relative z-10 w-full max-w-4xl border dark:border-slate-700 max-h-[85vh] flex flex-col" onclick="event.stopPropagation()">
                            <button onclick="closeComfyWorkflowViewer()" class="btn-icon liquid-action absolute top-4 right-4 p-2 rounded-full text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors z-10"><i data-lucide="x" class="w-5 h-5"></i></button>
                            <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-1 flex items-center gap-3 pr-10"><i data-lucide="workflow" class="w-5 h-5 text-violet-500"></i>ComfyUI 工作流</h2>
                            <p class="text-xs text-slate-400 dark:text-slate-500 mb-4">从图片元数据中提取的完整工作流 JSON</p>
                            <div class="flex gap-2 mb-3">
                                <button onclick="navigator.clipboard.writeText(JSON.stringify(state.comfyWorkflowData, null, 2));showToast('工作流 JSON 已复制')" class="btn-icon liquid-action px-3 py-1.5 rounded-xl text-xs font-bold text-violet-600 dark:text-violet-400 bg-violet-50 dark:bg-violet-900/30 border border-violet-200 dark:border-violet-800/50 hover:bg-violet-100 dark:hover:bg-violet-900/50 transition-colors flex items-center gap-1.5"><i data-lucide="copy" class="w-3.5 h-3.5"></i>复制 JSON</button>
                            </div>
                            <div class="flex-1 min-h-0 overflow-auto custom-scrollbar bg-slate-50/80 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700 p-4">
                                <pre class="text-xs font-mono text-slate-700 dark:text-slate-300 whitespace-pre leading-relaxed">${escapedJson}</pre>
                            </div>
                        </div>
                    </div>`;
            } else if (comfyContainer) {
                comfyContainer.innerHTML = '';
            }

            lucide.createIcons();
        };

        const refreshAdaptiveInterfaceMode = () => {
            const wasMobileUi = document.body.classList.contains('mobile-ui');
            const isMobileUi = applyAdaptiveInterfaceMode();
            if (wasMobileUi !== isMobileUi && !state.isDataLoading) {
                renderSelectionArea();
                renderModals();
            }
        };

        window.addEventListener('resize', refreshAdaptiveInterfaceMode, { passive: true });
        window.addEventListener('orientationchange', () => {
            setTimeout(refreshAdaptiveInterfaceMode, 120);
        });

        (async () => {
            applyAdaptiveInterfaceMode();
            updateState({ isDataLoading: true });
            applyTheme();
            try {
                const savedMeta = localStorage.getItem(METADATA_KEY);
                const parsedMeta = savedMeta ? JSON.parse(savedMeta) : INITIAL_DATA;
                const imgMap = await getAllImagesFromIDB().catch(() => ({}));
                const merged = normalizeArtistList(parsedMeta).map(a => ({
                    ...a,
                    imageUrl: imgMap[a.id] || a.imageUrl || ''
                }));
                const savedCategoriesRaw = JSON.parse(localStorage.getItem(CATEGORY_KEY) || '[]');
                const savedCategories = normalizeCategoryList(savedCategoriesRaw);
                const categories = normalizeCategoryList([...savedCategories, ...buildKnownCategoriesFromArtists(merged)]);
                updateState({ liveArtists: merged, categories, activeCategory: 'uncategorized', isDataLoading: false });
            } catch (e) {
                const fallbackArtists = normalizeArtistList(INITIAL_DATA);
                const fallbackCategories = buildKnownCategoriesFromArtists(fallbackArtists);
                updateState({ liveArtists: fallbackArtists, categories: fallbackCategories, activeCategory: 'uncategorized', isDataLoading: false });
            }
        })();
    </script>
</body>
</html>
