                    const exifPrefix = new Uint8Array([0xFF, 0xD8, 0xFF, 0xE1, 0x00, 0x00, 0x45, 0x78, 0x69, 0x66, 0x00, 0x00]);
                    const merged = new Uint8Array(exifPrefix.length + tiff.byteLength);
                    merged.set(exifPrefix, 0);
                    merged.set(new Uint8Array(tiff), exifPrefix.length);
                    const size = merged.length - 4;
                    merged[4] = (size >> 8) & 0xFF;
                    merged[5] = size & 0xFF;
                    return merged.buffer;
                })());
                if (userComment) out.user_comment = userComment;
                Object.assign(out, readWebpExifTextEntries(exifView));
            }
            return out;
        };

        const readRawMetadataFromFile = async (file) => {
            const fileType = await getImageTypeFromBinarySignature(file);
            if (fileType === 'image/png') return await readPngMetadata(file);
            if (fileType === 'image/jpeg') {
                const buf = await file.arrayBuffer();
                return { user_comment: readJpegUserComment(buf) || '' };
            }
            if (fileType === 'image/webp') {
                const buf = await file.arrayBuffer();
                return readWebpMetadata(buf);
            }
            return {};
        };

        const extractFirstJSONObject = (text) => {
            const s = String(text || '');
            let start = -1;
            let depth = 0;
            let inString = false;
            let escaped = false;
            for (let i = 0; i < s.length; i++) {
                const ch = s[i];
                if (start < 0) {
                    if (ch === '{') {
                        start = i;
                        depth = 1;
                    }
                    continue;
                }
                if (inString) {
                    if (escaped) {
                        escaped = false;
                    } else if (ch === '\\') {
                        escaped = true;
                    } else if (ch === '"') {
                        inString = false;
                    }
                    continue;
                }
                if (ch === '"') {
                    inString = true;
                    continue;
                }
                if (ch === '{') depth++;
                else if (ch === '}') {
                    depth--;
                    if (depth === 0) return s.slice(start, i + 1);
                }
            }
            return '';
        };

        const parseJSONLoose = (input) => {
            if (input && typeof input === 'object') return input;
            if (typeof input !== 'string') return null;
            const raw = String(input || '');
            const withoutBom = raw.charCodeAt(0) === 0xFEFF ? raw.slice(1) : raw;
            const normalized = withoutBom
                .replaceAll('\0', '')
                .replace(/\bNaN\b/g, 'null')
                .replace(/\b-?Infinity\b/g, 'null')
                .trim();
            if (!normalized) return null;
            try {
                const first = JSON.parse(normalized);
                if (typeof first === 'string') {
                    const nested = String(first).trim();
                    if ((nested.startsWith('{') && nested.endsWith('}')) || (nested.startsWith('[') && nested.endsWith(']'))) {
                        try { return JSON.parse(nested); } catch (_) {}
                    }
                }
                return first;
            } catch (_) {}
            const candidate = extractFirstJSONObject(normalized);
            if (candidate) {
                try { return JSON.parse(candidate); } catch (_) {}
                try {
                    const cleaned = Array.from(candidate).filter((char) => {
                        const code = char.charCodeAt(0);
                        return code === 0x09 || code === 0x0A || code === 0x0D || code >= 0x20;
                    }).join('');
                    return JSON.parse(cleaned);
                } catch (_) {}
            }
            return null;
        };

        const unwrapNestedJsonFields = (input, maxDepth = 3) => {
            const out = parseJSONLoose(input);
            if (!out || typeof out !== 'object' || maxDepth <= 0) return out;
            const jsonishKeys = [
                'prompt', 'workflow', 'generation_data',
                'extraMetadata', 'metadata',
                'user_comment', 'usercomment',
                'description', 'camera_manufacturer',
                'image_descriptiion', 'image_description'
            ];
            for (const key of jsonishKeys) {
                const value = out[key];
                if (!value || typeof value !== 'string') continue;
                const parsed = parseJSONLoose(value);
                if (parsed && typeof parsed === 'object') {
                    out[key] = parsed;
                }
            }
            if (typeof out.extraMetadata === 'string') {
                const parsedExtra = parseJSONLoose(out.extraMetadata);
                if (parsedExtra && typeof parsedExtra === 'object') {
                    out.extraMetadata = parsedExtra;
                    Object.assign(out, parsedExtra);
                }
            }
            if (maxDepth > 1) {
                for (const key of ['prompt', 'workflow', 'generation_data']) {
                    if (out[key] && typeof out[key] === 'object') {
                        out[key] = unwrapNestedJsonFields(out[key], maxDepth - 1) || out[key];
                    }
                }
            }
            return out;
        };

        const getA1111FieldsFromText = (metaText = '') => {
            const text = String(metaText || '');
            const pick = (regex) => {
                const match = text.match(regex);
                return match ? String(match[1]).trim() : '';
            };
            const normalizeLoraWeight = (value, fallback = '1') => {
                const raw = String(value ?? '').trim();
                if (!raw) return fallback;
                const num = Number(raw);
                if (!Number.isFinite(num)) return raw;
                return String(num).replace(/\.0+$/, '').replace(/(\.\d*?)0+$/, '$1');
            };
            const normalizeLoraName = (value) => String(value || '').trim().replace(/^<|>$/g, '');
            const stringifyLoraEntry = (entry) => {
                const name = normalizeLoraName(entry?.name || '');
                if (!name) return '';
                const model = normalizeLoraWeight(entry?.model ?? '1');
                const clip = normalizeLoraWeight(entry?.clip ?? model);
                return `${name} (M:${model}, C:${clip})`;
            };
            const loraEntries = [];
            const loraInlineRegex = /<\s*lora\s*:\s*([^:>]+)\s*:\s*([+-]?(?:\d+(?:\.\d+)?|\.\d+))(?:\s*:\s*([+-]?(?:\d+(?:\.\d+)?|\.\d+)))?\s*>/ig;
            for (;;) {
                const loraInlineMatch = loraInlineRegex.exec(text);
                if (!loraInlineMatch) break;
                const modelW = normalizeLoraWeight(loraInlineMatch[2], '1');
                const clipW = normalizeLoraWeight(loraInlineMatch[3], modelW);
                loraEntries.push({ name: loraInlineMatch[1], model: modelW, clip: clipW });
            }
            for (let index = 1; index <= 12; index += 1) {
                const moduleMatch = text.match(new RegExp(`(?:^|[,\n])\\s*AddNet\\s+Module\\s+${index}\\s*:\\s*([^,\\n]+)`, 'i'));
                if (!moduleMatch) continue;
                const modelMatch = text.match(new RegExp(`(?:^|[,\n])\\s*AddNet\\s+Weight\\s+A\\s+${index}\\s*:\\s*([^,\\n]+)`, 'i'));
                const clipMatch = text.match(new RegExp(`(?:^|[,\n])\\s*AddNet\\s+Weight\\s+B\\s+${index}\\s*:\\s*([^,\\n]+)`, 'i'));
                const modelW = normalizeLoraWeight(modelMatch?.[1], '1');
                const clipW = normalizeLoraWeight(clipMatch?.[1], modelW);
                loraEntries.push({ name: moduleMatch[1], model: modelW, clip: clipW });
            }
            const loraWeights = Array.from(new Set(loraEntries.map(stringifyLoraEntry).filter(Boolean))).join(' | ');
            return {
                steps: pick(/(?:^|[,\n])\s*Steps\s*:\s*([^,\n]+)/i),
                sampler: pick(/(?:^|[,\n])\s*Sampler\s*:\s*([^,\n]+)/i),
                cfgScale: pick(/(?:^|[,\n])\s*CFG\s*scale\s*:\s*([^,\n]+)/i),
                seed: pick(/(?:^|[,\n])\s*Seed\s*:\s*([^,\n]+)/i),
                aiModel: pick(/(?:^|[,\n])\s*Model\s*:\s*([^,\n]+)/i),
                modelHash: pick(/(?:^|[,\n])\s*Model\s*hash\s*:\s*([^,\n]+)/i),
                loraWeights,
            };
        };

        const hasA1111LikeParams = (metaText = '') => {
            const parsed = getA1111FieldsFromText(metaText);
            const nonEmptyCount = Object.values(parsed).filter((v) => String(v || '').trim()).length;
            return nonEmptyCount >= 2;
        };

        const toComfyNodeLike = (node) => {
            if (!node || typeof node !== 'object') return null;
            if (node.class_type || node.inputs) return node;
            if (node.type || node.node_type) {
                const classType = String(node.class_type || node.type || node.node_type || '');
                const mappedInputs = node.inputs && typeof node.inputs === 'object' ? { ...node.inputs } : {};
                const widgets = Array.isArray(node.widgets_values) ? node.widgets_values : [];

                if (!Object.keys(mappedInputs).length && widgets.length) {
                    if (/ksampler/i.test(classType)) {
                        if (widgets[0] !== undefined) mappedInputs.seed = widgets[0];
                        if (widgets[2] !== undefined) mappedInputs.steps = widgets[2];
                        if (widgets[3] !== undefined) mappedInputs.cfg = widgets[3];
                        if (widgets[4] !== undefined) mappedInputs.sampler_name = widgets[4];
                        if (widgets[5] !== undefined) mappedInputs.scheduler = widgets[5];
                    } else if (/checkpointloader|checkpoint loader/i.test(classType)) {
                        if (widgets[0] !== undefined) mappedInputs.ckpt_name = widgets[0];
                    } else if (/emptylatentimage|latent/i.test(classType)) {
                        if (widgets[0] !== undefined) mappedInputs.width = widgets[0];
                        if (widgets[1] !== undefined) mappedInputs.height = widgets[1];
                    } else if (/cliptextencode|text/i.test(classType)) {
                        if (widgets[0] !== undefined) mappedInputs.text = widgets[0];
                    }
                }

                return {
                    ...node,
                    class_type: classType,
                    inputs: mappedInputs
                };
            }
            return null;
        };

        const isComfyNodeLike = (node) => !!toComfyNodeLike(node);

        const normalizeComfyGraph = (input) => {
            const unwrapped = unwrapNestedJsonFields(input, 2);
            if (!unwrapped || typeof unwrapped !== 'object') return null;
            if (Array.isArray(unwrapped)) {
                const mapped = {};
                unwrapped.forEach((rawNode, index) => {
                    const node = toComfyNodeLike(rawNode);
                    if (!node) return;
                    const id = node.id ?? node.node_id ?? index;
                    mapped[String(id)] = node;
                });
                return Object.keys(mapped).length ? mapped : null;
            }

            if (isComfyNodeLike(unwrapped)) return { '0': toComfyNodeLike(unwrapped) };

            const promptGraph = normalizeComfyGraph(unwrapped.prompt);
            if (promptGraph) return promptGraph;
            const workflowGraph = normalizeComfyGraph(unwrapped.workflow);
            if (workflowGraph) return workflowGraph;
            const nodesGraph = normalizeComfyGraph(unwrapped.nodes);
            if (nodesGraph) return nodesGraph;

            const entries = Object.entries(unwrapped);
            const mapped = {};
            for (const [id, rawNode] of entries) {
                const node = toComfyNodeLike(rawNode);
                if (node) mapped[String(id)] = node;
            }
            return Object.keys(mapped).length ? mapped : null;
        };

        const getComfyGenFields = (generationDataInput = '') => {
            const generationText = typeof generationDataInput === 'string' ? generationDataInput : JSON.stringify(generationDataInput || '');
            let md = typeof generationDataInput === 'object' && generationDataInput
                ? unwrapNestedJsonFields(generationDataInput)
                : unwrapNestedJsonFields(generationText);
            if (!md || typeof md !== 'object') return {};
            return {
                steps: md.steps !== undefined && md.steps !== null ? String(md.steps) : '',
                sampler: String(md.samplerName || md.sampler || md.sampler_name || '').trim(),
                cfgScale: md.cfgScale !== undefined && md.cfgScale !== null
                    ? String(md.cfgScale)
                    : (md.cfg !== undefined && md.cfg !== null ? String(md.cfg) : (md.guidance !== undefined && md.guidance !== null ? String(md.guidance) : '')),
                seed: md.seed !== undefined && md.seed !== null
                    ? String(md.seed)
                    : (md.noise_seed !== undefined && md.noise_seed !== null ? String(md.noise_seed) : ''),
                aiModel: String(
                    md.baseModel?.modelFileName ||
                    md.baseModel?.name ||
                    md.model?.modelFileName ||
                    md.model?.name ||
                    md.model ||
                    md.ckpt_name ||
                    md.base_ckpt_name ||
                    md.unet_name ||
                    ''
                ).trim(),
                modelHash: String(
                    md.baseModel?.hash ||
                    md.model?.hash ||
                    md.modelHash ||
                    ''
                ).trim(),
            };
        };

        const getComfyPromptFields = (promptText = '') => {
            const parsed = (promptText && typeof promptText === 'object') ? promptText : parseJSONLoose(promptText);
            const graph = normalizeComfyGraph(parsed);
            const textFallback = typeof promptText === 'string' ? promptText : JSON.stringify(promptText || '');

            const normalizeSeedLike = (seedRaw) => {
                const s = String(seedRaw || '').trim();
                if (!s) return '';
                if (s.startsWith('[')) {
                    const m = s.match(/^\[\s*"?([^",\]]+)"?/);
                    return m ? String(m[1]).trim() : s;
                }
                return s.replace(/^"|"$/g, '').trim();
            };

            const regexFallback = () => {
                const pick = (re) => {
                    const m = textFallback.match(re);
                    return m ? String(m[1]).trim() : '';
                };
                const resolveReferencedSeedFromText = (rawSeed) => {
                    const refMatch = String(rawSeed || '').match(/^\[\s*"?(\d+)"?\s*,/);
                    if (!refMatch) return '';
                    const nodeId = refMatch[1];
                    const escapedId = nodeId.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const pattern = new RegExp(`\"${escapedId}\"\\s*:\\s*\\{[\\s\\S]*?\"inputs\"\\s*:\\s*\\{[\\s\\S]*?\"seed\"\\s*:\\s*(\"[^\"]+\"|-?\\d+(?:\\.\\d+)?)`, 'i');
                    const m = textFallback.match(pattern);
                    if (!m) return '';
                    return String(m[1] || '').replace(/^"|"$/g, '').trim();
                };

                const seedRaw = pick(/"seed"\s*:\s*(\[[^\]]+\]|"[^"]+"|-?\d+(?:\.\d+)?)/i) || pick(/"noise_seed"\s*:\s*(\[[^\]]+\]|"[^"]+"|-?\d+(?:\.\d+)?)/i);
                const seedResolved = resolveReferencedSeedFromText(seedRaw) || normalizeSeedLike(seedRaw);
                return {
                    steps: pick(/"steps"\s*:\s*("[^"]+"|-?\d+(?:\.\d+)?)/i).replace(/^"|"$/g, ''),
                    sampler: pick(/"sampler_name"\s*:\s*"([^"]+)"/i),
                    cfgScale: pick(/"cfg"\s*:\s*("[^"]+"|-?\d+(?:\.\d+)?)/i).replace(/^"|"$/g, '') || pick(/"guidance"\s*:\s*("[^"]+"|-?\d+(?:\.\d+)?)/i).replace(/^"|"$/g, ''),
                    seed: seedResolved,
                    aiModel: pick(/"ckpt_name"\s*:\s*"([^"]+)"/i) || pick(/"base_ckpt_name"\s*:\s*"([^"]+)"/i) || pick(/"unet_name"\s*:\s*"([^"]+)"/i),
                    modelHash: '',
                };
            };

            if (!graph || typeof graph !== 'object') return regexFallback();
            const entries = Object.entries(graph);
            const nodeRefMap = new Map(entries.map(([id, node]) => [String(id), node]));
            const referencedNodeIds = new Set();
            const collectRefs = (value) => {
                if (!Array.isArray(value)) {
                    if (value && typeof value === 'object') Object.values(value).forEach(collectRefs);
                    return;
                }
                if (value.length >= 2 && (typeof value[0] === 'string' || typeof value[0] === 'number')) {
                    referencedNodeIds.add(String(value[0]));
                }
                value.forEach(collectRefs);
            };
            entries.forEach(([, node]) => {
                collectRefs(node?.inputs);
            });
            const sinkNodeIds = entries
                .filter(([id, node]) => {
                    const classType = String(node?.class_type || '').toLowerCase();
                    const isLikelySink = /saveimage|previewimage|imagesave|save\s*image|vaedecode|image\s*output/.test(classType);
                    return isLikelySink || !referencedNodeIds.has(String(id));
                })
                .map(([id]) => String(id));
            const activeNodeIds = (() => {
                if (!sinkNodeIds.length) return new Set(nodeRefMap.keys());
                const active = new Set();
                const stack = [...sinkNodeIds];
                while (stack.length) {
                    const nodeId = String(stack.pop());
                    if (active.has(nodeId)) continue;
                    active.add(nodeId);
                    const node = nodeRefMap.get(nodeId);
                    if (!node?.inputs || typeof node.inputs !== 'object') continue;
                    Object.values(node.inputs).forEach((value) => {
                        const walk = (v) => {
                            if (Array.isArray(v)) {
                                if (v.length >= 2 && (typeof v[0] === 'string' || typeof v[0] === 'number')) stack.push(String(v[0]));
                                v.forEach(walk);
                                return;
                            }
                            if (v && typeof v === 'object') Object.values(v).forEach(walk);
                        };
                        walk(value);
                    });
                }
                return active;
            })();
            const nodes = entries.filter(([id]) => activeNodeIds.has(String(id))).map(([, node]) => node).filter(Boolean);
            const getNodeById = (id) => graph?.[String(id)] || null;
            const normalizeValue = (value, fieldName = '') => {
                if (Array.isArray(value)) {
                    if (value.length >= 2 && (typeof value[0] === 'string' || typeof value[0] === 'number')) {
                        const refNode = getNodeById(value[0]);
                        if (refNode && refNode.inputs && typeof refNode.inputs === 'object') {
                            const preferredKeys = fieldName === 'seed' ? ['seed', 'value', 'int', 'number', 'noise_seed'] : ['value', 'text', 'string', 'name', 'model', 'ckpt_name', 'base_ckpt_name', 'unet_name'];
                            for (const key of preferredKeys) {
                                if (refNode.inputs[key] !== undefined && refNode.inputs[key] !== null && refNode.inputs[key] !== '') {
                                    return normalizeValue(refNode.inputs[key], fieldName);
                                }
                            }
                            const firstScalar = Object.values(refNode.inputs).find(v => (typeof v === 'string' || typeof v === 'number') && String(v).trim() !== '');
                            if (firstScalar !== undefined) return normalizeValue(firstScalar);
                        }
                    }
                    return normalizeValue(value[0], fieldName);
                }
                if (value === undefined || value === null) return '';
                return String(value);
            };
            const firstFromNodes = (classRegex, fields) => {
                for (const node of nodes) {
                    const classType = String(node.class_type || '').toLowerCase();
                    if (!classRegex.test(classType)) continue;
                    for (const field of fields) {
                        const value = node.inputs?.[field];
                        const normalizedValue = normalizeValue(value, field).trim();
                        if (normalizedValue) return normalizedValue;
                    }
                }
                return '';
            };
            const fromGraph = {
                steps: firstFromNodes(/scheduler|sampler/, ['steps']),
                sampler: firstFromNodes(/scheduler|sampler/, ['sampler_name', 'sampler']),
                cfgScale: firstFromNodes(/guidance|sampler|cliptextencode/, ['guidance', 'cfg']),
                seed: firstFromNodes(/randomnoise|sampler|seed/, ['noise_seed', 'seed']),
                aiModel: firstFromNodes(/checkpoint|loader/, ['ckpt_name', 'base_ckpt_name', 'unet_name']),
                modelHash: firstFromNodes(/checkpoint|loader/, ['model_hash', 'ckpt_hash', 'hash']),
            };
            const loraEntries = [];
            nodes.forEach((node) => {
                const classType = String(node?.class_type || '').toLowerCase();
                if (!/lora/.test(classType)) return;
                const inputs = node?.inputs || {};
                const loraName = normalizeValue(inputs.lora_name || inputs.name || inputs.model || inputs.lora || '');
                if (!String(loraName || '').trim()) return;
                const modelW = normalizeValue(inputs.strength_model ?? inputs.model_strength ?? inputs.weight ?? 1);
                const clipW = normalizeValue(inputs.strength_clip ?? inputs.clip_strength ?? inputs.weight_clip ?? modelW ?? 1);
                loraEntries.push(`${String(loraName).trim()} (M:${String(modelW || '1').trim()}, C:${String(clipW || modelW || '1').trim()})`);
            });
            const loraWeights = Array.from(new Set(loraEntries.filter(Boolean))).join(' | ');
            const fallback = regexFallback();
            return {
                steps: fromGraph.steps || fallback.steps,
                sampler: fromGraph.sampler || fallback.sampler,
                cfgScale: fromGraph.cfgScale || fallback.cfgScale,
                seed: fromGraph.seed || fallback.seed,
                aiModel: fromGraph.aiModel || fallback.aiModel,
                modelHash: fromGraph.modelHash || fallback.modelHash,
                loraWeights,
            };
        };

        const getSwarmUIFields = (metadataText = '') => {
            const md = parseJSONLoose(metadataText);
            if (!md || typeof md !== 'object') return {};
            const sui = md.sui_image_params;
            if (!sui || typeof sui !== 'object') return {};
            const modelName = md.sui_models?.find?.((m) => m?.param === 'model')?.name || sui.model || sui.sdxlcheckpointmodel || '';
            const modelHash = md.sui_models?.find?.((m) => m?.param === 'model')?.hash || '';
            return {
                steps: sui.steps !== undefined && sui.steps !== null ? String(sui.steps) : '',
                sampler: String(sui.sampler || '').trim(),
                cfgScale: sui.cfgscale !== undefined && sui.cfgscale !== null ? String(sui.cfgscale) : '',
                seed: sui.seed !== undefined && sui.seed !== null ? String(sui.seed) : '',
                aiModel: String(modelName || '').trim(),
                modelHash: String(modelHash || '').trim(),
            };
        };

        const getNovelAIFields = (commentText = '') => {
            if (!isLikelyNovelAIMetadata(commentText)) return {};
            const md = unwrapNestedJsonFields(commentText);
            if (!md || typeof md !== 'object') return {};
            const sourceText = String(md.source || md.software || md.generator || '').trim();
            return {
                steps: md.steps !== undefined && md.steps !== null ? String(md.steps) : '',
                sampler: String(md.sampler || md.sampling || '').trim(),
                cfgScale: md.scale !== undefined && md.scale !== null ? String(md.scale) : '',
                seed: md.seed !== undefined && md.seed !== null ? String(md.seed) : '',
                aiModel: sourceText,
                modelHash: '',
            };
        };

        const isLikelyNovelAIMetadata = (input) => {
            const md = unwrapNestedJsonFields(input);
            if (!md || typeof md !== 'object') return false;
            const source = String(md.source || md.software || md.generator || '').toLowerCase();
            if (source.includes('novelai') || source.includes('nai diffusion')) return true;
            return !!(md.uc !== undefined && (md.steps !== undefined || md.scale !== undefined || md.sampler !== undefined));
        };

        const detectGeneratorType = (rawMetadata = {}, comfyGraph = null) => {
            if (comfyGraph && typeof comfyGraph === 'object' && Object.keys(comfyGraph).length) return 'COMFY';

            const raw = Object.fromEntries(Object.entries(rawMetadata || {}).map(([k, v]) => [String(k || '').toLowerCase(), v]));
            const candidates = [
                raw.prompt,
                raw.workflow,
                raw.generation_data,
                raw.parameters,
                raw.user_comment,
                raw.usercomment,
                raw.comment,
                raw.description,
                raw.camera_manufacturer,
                raw.image_descriptiion,
                raw.image_description,
                raw.software,
                raw.source,
            ].filter((v) => v !== undefined && v !== null && String(v).trim() !== '');

            for (const candidate of candidates) {
                if (isLikelyNovelAIMetadata(candidate)) return 'NAI';
            }
            for (const candidate of candidates) {
                if (hasA1111LikeParams(candidate)) return 'SD';
            }
            return '';
        };

        const normalizeRawMetadataToFields = (rawMetadata = {}) => {
            const raw = Object.fromEntries(Object.entries(rawMetadata).map(([k, v]) => [String(k || '').toLowerCase(), v]));
            const nestedCandidates = [];
            Object.values(raw).forEach((value) => {
                const parsed = unwrapNestedJsonFields(value);
                if (parsed && typeof parsed === 'object') {
                    nestedCandidates.push(parsed);
                    if (parsed.prompt) nestedCandidates.push(parsed.prompt);
                    if (parsed.workflow) nestedCandidates.push(parsed.workflow);
                    if (parsed.generation_data) nestedCandidates.push(parsed.generation_data);
                }
            });
            const metadataCandidates = [
                raw.prompt,
                raw.workflow,
                raw.generation_data,
                raw.parameters,
                raw.user_comment,
                raw.usercomment,
                raw.description,
                raw.comment,
                raw.camera_manufacturer,
                raw.image_descriptiion,
                raw.image_description,
                ...nestedCandidates
            ].filter((v) => (typeof v === 'string' && String(v).trim()) || (v && typeof v === 'object'));

            const sources = [
                getComfyPromptFields(raw.prompt || raw.workflow || ''),
                getComfyGenFields(raw.generation_data || ''),
                getSwarmUIFields(raw.parameters || raw.user_comment || raw.usercomment || raw.description || ''),
                getA1111FieldsFromText(raw.parameters || raw.user_comment || raw.usercomment || raw.description || ''),
                getNovelAIFields(raw.comment || ''),
            ];

            for (const candidate of metadataCandidates) {
                sources.push(getComfyPromptFields(candidate));
                sources.push(getComfyGenFields(candidate));
                sources.push(getSwarmUIFields(candidate));
                sources.push(getA1111FieldsFromText(candidate));
                sources.push(getNovelAIFields(candidate));
            }

            const merged = {};
            for (const source of sources) {
                Object.entries(source).forEach(([k, v]) => {
                    const value = String(v || '').trim();
                    if (!value) return;
                    if (!merged[k]) merged[k] = value;
                });
            }

            if (!Object.keys(merged).length) {
                const values = Object.values(raw).filter(v => typeof v === 'string');
                for (const valueText of values) {
                    const parsed = getA1111FieldsFromText(valueText);
                    Object.entries(parsed).forEach(([k, v]) => {
                        const value = String(v || '').trim();
                        if (!value) return;
                        if (!merged[k]) merged[k] = value;
                    });
                }
            }
            const comfyGraph = detectComfyWorkflow(rawMetadata);
            const generatorType = detectGeneratorType(rawMetadata, comfyGraph);
            if (generatorType) merged.generatorType = generatorType;
            return merged;
        };

        const mergeArtistFields = (target, incoming) => {
            const merged = { ...target };
            Object.entries(incoming).forEach(([k, v]) => {
                const next = String(v || '').trim();
                if (!next) return;
                if (k === 'generatorType') {
                    const currType = normalizeGeneratorType(merged[k]);
                    if (!currType && ['SD', 'COMFY', 'NAI'].includes(next)) merged[k] = next;
                    return;
                }
                const curr = String(merged[k] || '').trim();
                if (!curr) {
                    merged[k] = next;
                    return;
                }
                const currParts = curr.split('|').map(s => s.trim()).filter(Boolean);
                if (!currParts.includes(next)) currParts.push(next);
                merged[k] = currParts.join(' | ');
            });
            return merged;
        };

        const buildMetadataImageFile = async (imageUrl, artistId = '') => {
            if (!imageUrl) return null;
            let blob = null;
            try {
                const response = await fetch(imageUrl);
                blob = await response.blob();
            } catch (_) {}
            if (!blob && artistId) {
                blob = await getImageBlobFromIDB(artistId);
            }
            if (!blob) return null;
            const guessedType = blob.type || (String(imageUrl).includes('data:image/png')
                ? 'image/png'
                : String(imageUrl).includes('data:image/jpeg')
                    ? 'image/jpeg'
                    : String(imageUrl).includes('data:image/webp')
                        ? 'image/webp'
                        : 'image/png');
            const ext = guessedType.includes('png') ? 'png' : guessedType.includes('jpeg') ? 'jpg' : guessedType.includes('webp') ? 'webp' : 'png';
            return new File([blob], `artist-${artistId || 'image'}.${ext}`, { type: guessedType });
        };

        const extractFieldsFromImageUrl = async (imageUrl, artistId = '') => {
            const file = await buildMetadataImageFile(imageUrl, artistId);
            if (!file) return null;
            const rawMetadata = await readRawMetadataFromFile(file);
            const extracted = normalizeRawMetadataToFields(rawMetadata);
            const hasAny = Object.values(extracted).some(v => String(v || '').trim());
            return hasAny ? extracted : null;
        };

        const extractRawMetadataFromImageUrl = async (imageUrl, artistId = '') => {
            const file = await buildMetadataImageFile(imageUrl, artistId);
            if (!file) return null;
            return await readRawMetadataFromFile(file);
        };

        const hydrateComfyWorkflowForEdit = async (artist) => {
            const artistId = String(artist?.id || '');
            const imageUrl = String(artist?.imageUrl || '').trim();
            if (!artistId || !imageUrl) return;

            if (artist?.comfyWorkflowData && typeof artist.comfyWorkflowData === 'object') {
                if (state.isModalOpen && String(state.editingArtist?.id || '') === artistId) {
                    state.comfyWorkflowData = artist.comfyWorkflowData;
                    renderModals();
                }
                return;
            }

            try {
                const rawMetadata = await extractRawMetadataFromImageUrl(imageUrl, artistId);
                if (!rawMetadata) return;
                const comfyData = detectComfyWorkflow(rawMetadata);
                if (!comfyData) return;
                if (!state.isModalOpen || String(state.editingArtist?.id || '') !== artistId) return;
                state.comfyWorkflowData = comfyData;
                renderModals();
            } catch (error) {
                console.warn('[comfy-hydrate] failed:', error);
            }
        };

        const resolveAnalyzeImageUrl = async (imageUrl, artistId = '') => {
            const src = String(imageUrl || '').trim();
            if (!src) return '';
            if (/^https?:\/\//i.test(src) || /^data:/i.test(src)) return src;

            let blob = null;
            try {
                const response = await fetch(src);
                if (response.ok) blob = await response.blob();
            } catch (_) {}

            if (!blob && artistId) {
                blob = await getImageBlobFromIDB(artistId);
            }

            if (!blob) return '';
            try {
                return await blobToDataUrl(blob);
            } catch (_) {
                return '';
            }
        };

        const detectComfyWorkflow = (rawMetadata = {}) => {
            const raw = Object.fromEntries(Object.entries(rawMetadata).map(([k, v]) => [String(k || '').toLowerCase(), v]));
            const nestedCandidates = [];
            Object.values(raw).forEach((value) => {
                const parsed = unwrapNestedJsonFields(value);
                if (parsed && typeof parsed === 'object') {
                    nestedCandidates.push(parsed);

        const SYNC_BUTTON_HOLD_MS = 720;

        const clampNumber = (value, min, max) => Math.min(max, Math.max(min, value));
        const formatLoraWeightItem = (entry = '') => {
            const raw = String(entry || '').trim();
            if (!raw) return '';

            const normalized = raw.replace(/\s+/g, ' ').trim();
            const weightedMatch = normalized.match(/^(.*?)(?:\s*\(\s*M\s*:\s*([^,)]+)\s*,\s*C\s*:\s*([^,)]+)\s*\))$/i);
            if (weightedMatch) {
                const name = String(weightedMatch[1] || '').trim();
                const modelWeight = String(weightedMatch[2] || '').trim();
                const clipWeight = String(weightedMatch[3] || '').trim();
                if (!name) return '';
                return `${name} (M:${modelWeight || '1'}, C:${clipWeight || modelWeight || '1'})`;
            }

            const webUiLoraMatch = normalized.match(/^<\s*lora\s*:\s*([^:>]+)\s*:\s*([^>]+)>$/i);
            if (webUiLoraMatch) {
                const name = String(webUiLoraMatch[1] || '').trim();
                const weight = String(webUiLoraMatch[2] || '').trim() || '1';
                if (!name) return '';
                return `${name} (M:${weight}, C:${weight})`;
            }

            const pairMatch = normalized.match(/^([^:|]+)\s*:\s*([\d.]+)$/);
            if (pairMatch) {
                const name = String(pairMatch[1] || '').trim();
                const modelWeight = String(pairMatch[2] || '').trim() || '1';
                if (!name) return '';
                return `${name} (M:${modelWeight}, C:1)`;
            }

            return normalized;
        };
        const parseLoraWeightList = (value = '') => {
            const raw = String(value || '').trim();
            if (!raw) return [];

            const candidates = [];

            if (raw.startsWith('[') && raw.endsWith(']')) {
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) {
                        parsed.forEach((item) => {
                            const normalized = formatLoraWeightItem(item);
                            if (normalized) candidates.push(normalized);
                        });
                    }
                } catch (_) {
                    // noop
                }
            }

            const webUiMatches = raw.match(/<\s*lora\s*:[^>]+>/gi) || [];
            webUiMatches.forEach((token) => {
                const normalized = formatLoraWeightItem(token);
                if (normalized) candidates.push(normalized);
            });

            const weightedMatches = raw.match(/[^|\n]+?\(\s*M\s*:[^,)]+\s*,\s*C\s*:[^,)]+\s*\)/gi) || [];
            weightedMatches.forEach((token) => {
                const normalized = formatLoraWeightItem(token);
                if (normalized) candidates.push(normalized);
            });

            if (!candidates.length) {
                raw
                    .split(/[|｜\n;；]+/)
                    .map((item) => formatLoraWeightItem(item))
                    .filter(Boolean)
                    .forEach((item) => {
                        candidates.push(item);
                    });
            }

            return Array.from(new Set(candidates));
        };
        const parseLoraDisplayItem = (item = '') => {
            const normalized = String(item || '').trim();
            if (!normalized) {
                return { name: '', modelWeight: '1', clipWeight: '1' };
            }
            const weightedMatch = normalized.match(/^(.*?)\s*\(\s*M\s*:\s*([^,)]+)\s*,\s*C\s*:\s*([^,)]+)\s*\)$/i);
            if (weightedMatch) {
                return {
                    name: String(weightedMatch[1] || '').trim(),
                    modelWeight: String(weightedMatch[2] || '1').trim() || '1',
                    clipWeight: String(weightedMatch[3] || '1').trim() || '1'
                };
            }
            return { name: normalized, modelWeight: '1', clipWeight: '1' };
        };

        const clearSyncProgressResetTimer = () => {
            if (syncProgressResetTimer) {
                clearTimeout(syncProgressResetTimer);
                syncProgressResetTimer = null;
            }
        };
        const scheduleSyncProgressReset = (delay = 900) => {
            clearSyncProgressResetTimer();
            syncProgressResetTimer = setTimeout(() => {
                updateState({
                    syncProgressVisible: false,
                    syncProgressPercent: 0,
                    syncProgressLabel: '',
                    syncProgressStatus: 'idle'
                });
                syncProgressResetTimer = null;
            }, delay);
        };
        const beginSyncProgress = (label) => {
            clearSyncProgressResetTimer();
            updateState({
                syncProgressVisible: true,
                syncProgressPercent: 8,
                syncProgressLabel: String(label || '同步处理中...'),
                syncProgressStatus: 'running'
            });
        };
        const updateSyncProgress = (percent, label, status = 'running') => {
            clearSyncProgressResetTimer();
            const nextPercent = clampNumber(Number(percent) || 0, 0, 100);
            updateState({
                syncProgressVisible: true,
                syncProgressPercent: nextPercent,
                syncProgressLabel: String(label || state.syncProgressLabel || '同步处理中...'),
                syncProgressStatus: status
            });
        };
        const finishSyncProgress = (label) => {
            updateSyncProgress(100, label || '同步完成', 'success');
            scheduleSyncProgressReset(1000);
        };
        const failSyncProgress = (label) => {
            const fallbackPercent = Math.max(8, Number(state.syncProgressPercent) || 0);
            updateSyncProgress(fallbackPercent, label || '同步失败', 'error');
            scheduleSyncProgressReset(2000);
        };

        const getGeneratorWindowMetrics = () => {
            const isTablet = window.innerWidth <= 1024;
            const margin = isTablet ? 16 : 24;
            const width = isTablet ? 300 : 360;
            const minTop = isTablet ? 88 : 96;
            const maxHeight = Math.min(Math.round(window.innerHeight * 0.72), window.innerHeight - minTop - margin);
            return { width, margin, minTop, height: Math.max(320, maxHeight) };
        };

        const clampGeneratorWindowPosition = (x, y, panelHeight, metrics = getGeneratorWindowMetrics()) => {
            const maxX = Math.max(metrics.margin, window.innerWidth - metrics.width - metrics.margin);
            const maxY = Math.max(metrics.minTop, window.innerHeight - panelHeight - metrics.margin);
            return {
                x: clampNumber(Number(x), metrics.margin, maxX),
                y: clampNumber(Number(y), metrics.minTop, maxY)
            };
        };

        const saveGeneratorWindowPosition = () => {
            if (!generatorWindowPos) return;
            try {
                localStorage.setItem(GENERATOR_WINDOW_POS_KEY, JSON.stringify(generatorWindowPos));
            } catch (_) {}
        };

        const getPointerClient = (event) => {
            if (event.touches && event.touches[0]) {
                return { x: event.touches[0].clientX, y: event.touches[0].clientY };
            }
            if (event.changedTouches && event.changedTouches[0]) {
                return { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
            }
            return { x: event.clientX, y: event.clientY };
        };

        const stopGeneratorDrag = () => {
            if (!generatorDragState.active) return;
            if (generatorDragState.rafId) {
                window.cancelAnimationFrame(generatorDragState.rafId);
                generatorDragState.rafId = 0;
            }
            if (generatorDragState.container) {
                generatorDragState.container.style.removeProperty('will-change');
            }
            generatorDragState.active = false;
            generatorDragState.container = null;
            document.body.classList.remove('select-none', 'dragging-generator');
            document.body.style.userSelect = '';
            saveGeneratorWindowPosition();
        };

        const applyGeneratorDragFrame = () => {
            generatorDragState.rafId = 0;
            if (!generatorDragState.active || !generatorDragState.container) return;
            const metrics = getGeneratorWindowMetrics();
            const next = clampGeneratorWindowPosition(
                generatorDragState.pointerX - generatorDragState.offsetX,
                generatorDragState.pointerY - generatorDragState.offsetY,
                generatorDragState.panelHeight || metrics.height,
                metrics
            );
            generatorWindowPos = next;
            generatorDragState.container.style.left = `${next.x}px`;
            generatorDragState.container.style.top = `${next.y}px`;
        };

        const requestGeneratorDragFrame = () => {
            if (generatorDragState.rafId) return;
            generatorDragState.rafId = window.requestAnimationFrame(applyGeneratorDragFrame);
        };

        const handleGeneratorDragMove = (event) => {
            if (!generatorDragState.active) return;
            if (!generatorDragState.container || generatorDragState.container.classList.contains('hidden')) {
                stopGeneratorDrag();
                return;
            }
            if (event.cancelable) event.preventDefault();
            const pointer = getPointerClient(event);
            generatorDragState.pointerX = pointer.x;
            generatorDragState.pointerY = pointer.y;
            requestGeneratorDragFrame();
        };

        window.startGeneratorDrag = (event) => {
            if (window.innerWidth <= 768) return;
            if (document.body.classList.contains('mobile-ui')) return;
            if (event.type === 'mousedown' && event.button !== 0) return;
            const container = document.getElementById('sidebar-area');
            if (!container || container.classList.contains('hidden')) return;

            const pointer = getPointerClient(event);
            const rect = container.getBoundingClientRect();
            generatorDragState = {
                active: true,
                offsetX: pointer.x - rect.left,
                offsetY: pointer.y - rect.top,
                pointerX: pointer.x,
                pointerY: pointer.y,
                panelHeight: rect.height,
                rafId: 0,
                container
            };
            container.style.willChange = 'left, top';
            document.body.classList.add('select-none', 'dragging-generator');
            document.body.style.userSelect = 'none';
            if (event.cancelable) event.preventDefault();
        };

        window.addEventListener('mousemove', handleGeneratorDragMove);
        window.addEventListener('mouseup', stopGeneratorDrag);
        window.addEventListener('touchmove', handleGeneratorDragMove, { passive: false });
        window.addEventListener('touchend', stopGeneratorDrag);
        window.addEventListener('touchcancel', stopGeneratorDrag);

        const updateState = (newState, shouldRender = true) => {
            const oldSort = state.sortMode;
            state = { ...state, ...newState };
            
            if (!state.isDataLoading && newState.liveArtists) {
                const metadata = state.liveArtists.map(a => {
                    const { imageUrl, ...rest } = a;
                    const safeUrl = (imageUrl && (imageUrl.startsWith('data:') || imageUrl.startsWith('blob:'))) ? '' : imageUrl;
                    return { ...rest, imageUrl: safeUrl };
                });
                safeLocalStorageSetItem(METADATA_KEY, JSON.stringify(metadata));
            }

            if (newState.categories !== undefined) {
                safeLocalStorageSetItem(CATEGORY_KEY, JSON.stringify(normalizeCategoryList(state.categories)));
            }
            
            if (newState.theme) {
                safeLocalStorageSetItem(THEME_KEY, newState.theme);
                applyTheme(newState.theme);
            }

            if (newState.displayConfig) {
                safeLocalStorageSetItem(DISPLAY_CONFIG_KEY, JSON.stringify(state.displayConfig));
                applyDisplayPersonalization(state.displayConfig);
            }

            if (newState.aiConfig) {
                safeLocalStorageSetItem(AI_CONFIG_KEY, JSON.stringify(normalizeAiConfig(state.aiConfig || {})));
            }

            if (newState.webdavConfig) {
                safeLocalStorageSetItem(WEBDAV_CONFIG_KEY, JSON.stringify(normalizeWebdavConfig(state.webdavConfig)));
            }

            if (newState.s3Config) {
                safeLocalStorageSetItem(S3_CONFIG_KEY, JSON.stringify(normalizeS3Config(state.s3Config)));
            }

            if (newState.syncMethod) {
                safeLocalStorageSetItem(SYNC_METHOD_KEY, state.syncMethod === 's3' ? 's3' : 'webdav');
            }

            if (newState.nodeTagPresets !== undefined) {
                safeLocalStorageSetItem(NODE_TAG_PRESETS_KEY, JSON.stringify(normalizeNodeTagPresetList(state.nodeTagPresets)));
            }

            if (newState.nodeTagPresets !== undefined || newState.activeNodeTagPresetId !== undefined) {
                safeLocalStorageSetItem(NODE_TAG_PRESET_ACTIVE_KEY, String(state.activeNodeTagPresetId || ''));
            }

            if (shouldRender) {
                const fullRender = newState.liveArtists || newState.searchQuery !== undefined || newState.activeCategory !== undefined || newState.categories !== undefined || (newState.sortMode && newState.sortMode !== oldSort) || newState.theme;
                if (fullRender) {
                    renderApp(); 
                } else {
                    const syncProgressChanged = newState.syncProgressVisible !== undefined
                        || newState.syncProgressPercent !== undefined
                        || newState.syncProgressLabel !== undefined
                        || newState.syncProgressStatus !== undefined;
                    if (newState.selectedArtists) {
                        renderArtistCards(); 
                        renderSelectionArea(); 
                    }
                    if (newState.isModalOpen !== undefined || newState.isAISettingsOpen !== undefined || newState.isSyncModalOpen !== undefined) renderModals();
                    if (newState.syncMethod !== undefined || newState.webdavConfig !== undefined || newState.s3Config !== undefined) {
                        if (state.isSyncModalOpen) renderModals();
                    }
                    if (syncProgressChanged) {
                        renderSyncCornerProgress();
                        if (state.isSyncModalOpen) renderModals();
                    }
                    if (newState.previewImage !== undefined || newState.viewingNote !== undefined || newState.viewingLora !== undefined) renderModals();
                    if (newState.tagSelector !== undefined) renderModals();
                    if (newState.isNodeTagPresetOpen !== undefined || newState.nodeTagPresets !== undefined || newState.activeNodeTagPresetId !== undefined) renderModals();
                    if (newState.displayConfig) {
                        renderArtistCards();
                        if (state.isAISettingsOpen) renderModals();
                    }
                    if (newState.showThemeMenu !== undefined) renderThemeMenu();
                }
            }
        };

        // --- Global Actions ---
        window.toggleTheme = () => {
            const currentTheme = state.theme;
            const isDark = currentTheme === 'dark' || currentTheme === 'midnight';
            const nextTheme = isDark ? 'light' : 'dark';
            updateState({ theme: nextTheme });
        };

        window.setTheme = (themeName) => {
            updateState({ theme: themeName, showThemeMenu: false });
        };
        
        window.openLayoutSettings = () => updateState({ isAISettingsOpen: true });
        window.openSyncSettings = () => updateState({ isSyncModalOpen: true });
        const clearSyncButtonHoldTimer = () => {
            if (syncPressHoldTimer) {
                clearTimeout(syncPressHoldTimer);
                syncPressHoldTimer = null;
            }
        };
        window.handleSyncButtonPressStart = (event) => {
            if (event?.type === 'mousedown' && event.button !== 0) return;
            clearSyncButtonHoldTimer();
            syncPressLongTriggered = false;
            syncPressHoldTimer = setTimeout(async () => {
                syncPressLongTriggered = true;
                showToast('长按触发：正在同步当前配置到云端...');
                try {
                    await window.manualSyncUpload();
                } catch (_) {
                    // Error toast is handled inside manualSyncUpload
                }
            }, SYNC_BUTTON_HOLD_MS);
        };
        window.handleSyncButtonPressEnd = () => {
            clearSyncButtonHoldTimer();
        };
        window.handleSyncButtonClick = () => {
            clearSyncButtonHoldTimer();
            if (syncPressLongTriggered) {
                syncPressLongTriggered = false;
                return;
            }
            window.openSyncSettings();
        };

        window.setLayoutPreset = (preset) => {
            const base = state.displayConfig || {};
            if (preset === 'compact') {
                updateState({ displayConfig: { ...base, layoutPreset: 'compact', gridCols: 5, tileSize: 'sm', customGap: 6, customAspect: '3/4' } });
            } else if (preset === 'showcase') {
                updateState({ displayConfig: { ...base, layoutPreset: 'showcase', gridCols: 3, tileSize: 'lg', customGap: 10, customAspect: '3/4' } });
            } else if (preset === 'balanced') {
                updateState({ displayConfig: { ...base, layoutPreset: 'balanced', gridCols: 4, tileSize: 'md', customGap: 8, customAspect: '3/4' } });
            } else {
                updateState({ displayConfig: { ...base, layoutPreset: 'custom' } });
            }
            renderArtistCards();
        };

        window.updateLayoutCustom = (field, value) => {
            const base = state.displayConfig || {};
            const nextValue = ['customCols', 'customGap'].includes(field) ? parseInt(value, 10) || 0 : value;
            updateState({ displayConfig: { ...base, layoutPreset: 'custom', [field]: nextValue } }, false);
            renderArtistCards();
        };

        window.setStyleMode = (mode) => {
            const normalizedMode = mode === 'liquid-glass' ? 'liquid-glass' : 'default';
            const base = state.displayConfig || {};
            updateState({ displayConfig: { ...base, styleMode: normalizedMode } });
        };

        window.handleDisplayBackgroundUpload = async (event) => {
            const file = event?.target?.files?.[0];
            if (!file) return;
            if (!file.type || !file.type.startsWith('image/')) {
                showToast('请选择图片文件');
                event.target.value = '';
                return;
            }

            if (['image/heic', 'image/heif'].includes(file.type.toLowerCase())) {
                showToast('当前浏览器不支持 HEIC/HEIF，请先转为 JPG/PNG');
                event.target.value = '';
                return;
            }

            try {
                const dataUrl = await new Promise((resolve, reject) => {
                    const img = new Image();
                    const objectUrl = URL.createObjectURL(file);
                    img.onload = () => {
                        try {
                            const targetRatio = window.innerWidth / Math.max(1, window.innerHeight);
                            const sourceRatio = img.width / Math.max(1, img.height);
                            let sx = 0, sy = 0, sw = img.width, sh = img.height;
                            if (sourceRatio > targetRatio) {
                                sw = Math.floor(img.height * targetRatio);
                                sx = Math.floor((img.width - sw) / 2);
                            } else {
                                sh = Math.floor(img.width / targetRatio);
                                sy = Math.floor((img.height - sh) / 2);
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = Math.min(1920, sw);
                            canvas.height = Math.min(1080, sh);
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
                            const out = canvas.toDataURL('image/jpeg', 0.88);
                            URL.revokeObjectURL(objectUrl);
                            resolve(out);
                        } catch (e) {
                            URL.revokeObjectURL(objectUrl);
                            reject(e);
                        }
                    };
                    img.onerror = (e) => {
                        URL.revokeObjectURL(objectUrl);
                        reject(e);
                    };
                    img.src = objectUrl;
                });
                const base = state.displayConfig || {};
                updateState({ displayConfig: { ...base, backgroundImage: dataUrl } });
                showToast('背景图已应用');
            } catch (_) {
                try {
                    const rawDataUrl = await readImageAsBase64(file);
                    const base = state.displayConfig || {};
                    updateState({ displayConfig: { ...base, backgroundImage: rawDataUrl } });
                    showToast('背景图已应用（原图模式）');
                } catch (_) {
                    showToast('背景图读取失败');
                }
            } finally {
                event.target.value = '';
            }
        };

        window.removeDisplayBackground = () => {
            const base = state.displayConfig || {};
            updateState({ displayConfig: { ...base, backgroundImage: '' } });
            showToast('背景图已移除');
        };

        const getCardLayoutClasses = () => {
            const cfg = { ...getDefaultDisplayConfig(), ...(state.displayConfig || {}) };
            if (cfg.layoutPreset === 'compact') return { cols: 5, gap: 20, aspect: '3/4' };
            if (cfg.layoutPreset === 'showcase') return { cols: 3, gap: 32, aspect: '3/4' };
            if (cfg.layoutPreset === 'balanced') return { cols: 4, gap: 24, aspect: '3/4' };
            return {
                cols: Math.min(12, Math.max(1, parseInt(cfg.customCols, 10) || 4)),
                gap: Math.min(120, Math.max(0, parseInt(cfg.customGap, 10) || 24)),
                aspect: cfg.customAspect || '3/4'
            };
        };

        window.handleSearch = (val) => updateState({ searchQuery: val });

        window.setActiveCategory = (categoryValue) => {
            const raw = String(categoryValue || 'all');
            const normalized = (raw === 'all' || raw === 'uncategorized') ? raw : normalizeCategoryName(raw);
            if (normalized !== 'all' && normalized !== 'uncategorized' && !state.categories.includes(normalized)) return;
            updateState({ activeCategory: normalized });
        };

        let draggedCategoryIndex = null;

        window.handleCategoryDragStart = (e, index) => {
            draggedCategoryIndex = index;
            e.dataTransfer.effectAllowed = 'move';
            e.target.style.opacity = '0.5';
        };

        window.handleCategoryDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        };

        window.handleCategoryDragEnter = (e) => {
            e.preventDefault();
            const btn = e.target.closest('button');
            if (btn) btn.classList.add('scale-105', 'ring-2', 'ring-indigo-400');
        };

        window.handleCategoryDragLeave = (e) => {
            const btn = e.target.closest('button');
            if (btn) btn.classList.remove('scale-105', 'ring-2', 'ring-indigo-400');
        };

        window.handleCategoryDrop = (e, targetIndex) => {
            e.stopPropagation();
            const btn = e.target.closest('button');
            if (btn) btn.classList.remove('scale-105', 'ring-2', 'ring-indigo-400');
            
            if (draggedCategoryIndex !== null && draggedCategoryIndex !== targetIndex) {
                const newCategories = [...state.categories];
                const [draggedItem] = newCategories.splice(draggedCategoryIndex, 1);
                newCategories.splice(targetIndex, 0, draggedItem);
                updateState({ categories: newCategories });
            }
            draggedCategoryIndex = null;
            return false;
        };
        
        window.addEventListener('dragend', (e) => {
            if (e.target.tagName === 'BUTTON') {
                e.target.style.opacity = '1';
            }
        });

        window.addCategory = () => {
            const input = prompt('请输入新分类名称');
            if (input === null) return;
            const next = normalizeCategoryName(input);
            if (!next) {
                showToast('分类名称不能为空');
                return;
            }
            if (state.categories.includes(next)) {
                showToast('分类已存在');
                return;
            }
            if (state.isModalOpen) {
                state.formData.category = next;
            }
            updateState({ categories: [...state.categories, next], activeCategory: next });
            showToast(`已新增分类: ${next}`);
        };

        window.deleteCategory = (categoryName) => {
            const targetCategory = normalizeCategoryName(categoryName);
            if (!targetCategory) {
                showToast('分类名称不能为空');
                return;
            }
            if (!state.categories.includes(targetCategory)) {
                showToast('分类不存在');
                return;
            }

            const affectedCount = state.liveArtists.reduce((count, artist) => {
                return count + (normalizeCategoryName(artist.category) === targetCategory ? 1 : 0);
            }, 0);
            const confirmMessage = `确定删除分类「${targetCategory}」吗？\n该分类下 ${affectedCount} 位画师将被移动到未分类。`;
            if (!confirm(confirmMessage)) return;

            const nextArtists = state.liveArtists.map(artist => {
                if (normalizeCategoryName(artist.category) !== targetCategory) return artist;
                return { ...artist, category: '' };
            });
            const nextCategories = state.categories.filter(cat => cat !== targetCategory);
            const nextActiveCategory = state.activeCategory === targetCategory ? 'uncategorized' : state.activeCategory;

            if (state.isModalOpen && normalizeCategoryName(state.formData.category) === targetCategory) {
                state.formData.category = '';
            }

            updateState({ liveArtists: nextArtists, categories: nextCategories, activeCategory: nextActiveCategory });
            showToast(`已删除分类: ${targetCategory}`);
        };

        window.handleDeleteCategoryClick = (categoryName, e) => {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            window.deleteCategory(categoryName);
        };

        window.handleCategoryContextMenu = (categoryName, e) => {
            e.preventDefault();
            e.stopPropagation();
            window.deleteCategory(categoryName);
        };

        window.setSortMode = (newMode) => {
            let finalMode = newMode;
            if (newMode === 'alpha') finalMode = state.sortMode === 'alpha-asc' ? 'alpha-desc' : 'alpha-asc';
            if (newMode === 'danbooru') finalMode = state.sortMode === 'danbooru-desc' ? 'danbooru-asc' : 'danbooru-desc';
            if (newMode === 'model') finalMode = state.sortMode === 'model-asc' ? 'model-desc' : 'model-asc';
            updateState({ sortMode: finalMode });
        };

        window.clearSelection = () => updateState({ selectedArtists: {} });
        window.toggleSelection = (id) => {
            const newSel = { ...state.selectedArtists };
            if (newSel[id]) delete newSel[id]; else newSel[id] = 1.0;
            updateState({ selectedArtists: newSel });
        };
        window.updateArtistWeight = (id, delta, e) => {
            e.stopPropagation();
            const curr = state.selectedArtists[id] || 1.0;
            let next = parseFloat((curr + delta).toFixed(1));
            if (next < 0.1) next = 0.1; if (next > 2.0) next = 2.0;
            updateState({ selectedArtists: { ...state.selectedArtists, [id]: next } }, false);
            renderSelectionArea();
        };
        window.toggleFavorite = (id, e) => {
            e.stopPropagation();
            const newArtists = state.liveArtists.map(a => a.id === id ? { ...a, isFavorite: !a.isFavorite } : a);
            updateState({ liveArtists: newArtists });
        };
        const copyTextToClipboard = async (text) => {
            const content = String(text || '');
            if (!content) return false;
            if (navigator?.clipboard?.writeText) {
                try {
                    await navigator.clipboard.writeText(content);
                    return true;
                } catch (_) {}
            }

        const ensureImportPayloadSafe = (resolved) => {

        const normalizeErrorMessage = (error, fallback = '未知错误') => {
